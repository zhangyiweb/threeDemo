<!--
 * @Description: 激光特效 — 固定发射孔持续喷射带拖尾粒子，拼接成荧光辉光激光束，Bloom 柔光，GUI 调参
 * @Date: 2026-06-22
-->
<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>激光特效</title>
</head>
<style>
  * {
    margin: 0;
    padding: 0;
    overflow: hidden;
    box-sizing: border-box;
  }

  body {
    background: #1a2438;
  }

  #hint {
    position: absolute;
    left: 16px;
    top: 16px;
    z-index: 9;
    padding: 10px 14px;
    background: rgba(8, 14, 28, 0.55);
    color: #cfe6ff;
    font: 13px/1.7 "Segoe UI", "Microsoft YaHei", sans-serif;
    border: 1px solid rgba(80, 180, 255, 0.25);
    border-radius: 8px;
    backdrop-filter: blur(6px);
    pointer-events: none;
  }

  #hint b {
    color: #67e8ff;
  }
</style>

<body>
  <div id="hint">鼠标拖拽观察 · 滚轮缩放 · 右上角面板调节 <b>激光颜色 / 粒子 / 速度 / 拖尾 / 粗细</b></div>
  <div id="container"></div>
</body>

<script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
      }
    }
  </script>

<script type="module">
  import * as THREE from 'three';
  import Stats from 'three/addons/libs/stats.module.js';
  import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
  import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

  const container = document.getElementById('container');
  const clock = new THREE.Clock();

  const scene = new THREE.Scene();
  scene.background = new THREE.Color('#1e2d45');
  scene.fog = new THREE.FogExp2(0x1e2d45, 0.00055);

  const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 3000);
  camera.position.set(-80, 60, 160);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.55;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);

  const stats = new Stats();
  container.appendChild(stats.dom);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.target.set(120, 20, 0);
  controls.minDistance = 40;
  controls.maxDistance = 500;

  // ─── 后处理 Bloom ───────────────────────────────────────────
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.55, 0.45, 0.15);
  composer.addPass(bloomPass);
  composer.addPass(new OutputPass());

  // ─── 灯光 ───────────────────────────────────────────────────
  scene.add(new THREE.HemisphereLight(0xb8d4f8, 0x5a6a82, 1.35));
  const key = new THREE.DirectionalLight(0xfff4e8, 2.2);
  key.position.set(-120, 200, 120);
  key.castShadow = true;
  key.shadow.mapSize.set(1024, 1024);
  key.shadow.camera.near = 10;
  key.shadow.camera.far = 600;
  const sc = 280;
  key.shadow.camera.left = -sc; key.shadow.camera.right = sc;
  key.shadow.camera.top = sc; key.shadow.camera.bottom = -sc;
  scene.add(key);
  const fill = new THREE.DirectionalLight(0xa8c8ff, 1.1);
  fill.position.set(180, 80, -140);
  scene.add(fill);
  scene.add(new THREE.AmbientLight(0x6a88b0, 1.2));

  const metalMat = new THREE.MeshStandardMaterial({
    color: 0x6a7a94, roughness: 0.38, metalness: 0.72,
  });
  const floorMat = new THREE.MeshStandardMaterial({
    color: 0x4a5a72, roughness: 0.82, metalness: 0.15,
  });
  const wallMat = new THREE.MeshStandardMaterial({
    color: 0x5a6a84, roughness: 0.55, metalness: 0.4,
  });

  // 激光常量（发射点 / 方向 / 射程）
  const EMITTER = new THREE.Vector3(-40, 20, 0);
  const BEAM_DIR = new THREE.Vector3(1, 0, 0).normalize();
  const MAX_RANGE = 520;

  // ─── 场景：激光实验室 ───────────────────────────────────────
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(900, 500), floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.set(200, -8, 0);
  floor.receiveShadow = true;
  scene.add(floor);

  const platform = new THREE.Mesh(new THREE.BoxGeometry(60, 8, 80), metalMat);
  platform.position.set(-20, -4, 0);
  platform.castShadow = platform.receiveShadow = true;
  scene.add(platform);

  const wall = new THREE.Mesh(new THREE.BoxGeometry(12, 50, 80), wallMat);
  wall.position.set(-46, 21, 0);
  wall.castShadow = wall.receiveShadow = true;
  scene.add(wall);

  // 后墙与侧墙，围成可视实验舱
  const backWall = new THREE.Mesh(new THREE.BoxGeometry(700, 60, 8), wallMat);
  backWall.position.set(200, 22, -120);
  backWall.receiveShadow = true;
  scene.add(backWall);

  const sideWall = new THREE.Mesh(new THREE.BoxGeometry(8, 60, 260), wallMat);
  sideWall.position.set(200, 22, 120);
  sideWall.receiveShadow = true;
  scene.add(sideWall);

  // 顶部灯带（装饰 + 补光）
  [-80, 80, 240, 400].forEach((x) => {
    const lamp = new THREE.Mesh(
      new THREE.BoxGeometry(28, 3, 8),
      new THREE.MeshStandardMaterial({
        color: 0xd8e8ff, emissive: 0x88b8ff, emissiveIntensity: 1.6,
        roughness: 0.3, metalness: 0.2,
      })
    );
    lamp.position.set(x, 52, 0);
    scene.add(lamp);
    const pl = new THREE.PointLight(0xc8dcff, 1.8, 180);
    pl.position.set(x, 48, 0);
    scene.add(pl);
  });

  // 导轨与支架
  const railMat = new THREE.MeshStandardMaterial({ color: 0x8898b0, roughness: 0.35, metalness: 0.85 });
  const rail = new THREE.Mesh(new THREE.BoxGeometry(MAX_RANGE + 60, 2, 6), railMat);
  rail.position.set(EMITTER.x + MAX_RANGE * 0.5, 6, -30);
  scene.add(rail);
  const rail2 = rail.clone();
  rail2.position.z = 30;
  scene.add(rail2);

  [-20, 120, 260, 400].forEach((x) => {
    const post = new THREE.Mesh(new THREE.CylinderGeometry(1.8, 2.2, 14, 12), railMat);
    post.position.set(x, 0, -30);
    scene.add(post);
    const post2 = post.clone();
    post2.position.z = 30;
    scene.add(post2);
  });

  const grid = new THREE.GridHelper(900, 90, 0x5a8ac0, 0x3a5070);
  grid.position.y = -7.9;
  grid.material.transparent = true;
  grid.material.opacity = 0.7;
  scene.add(grid);

  // 激光发射孔（固定起点）
  const holeGroup = new THREE.Group();
  holeGroup.position.copy(EMITTER);
  scene.add(holeGroup);

  // 孔洞内凹
  const recess = new THREE.Mesh(
    new THREE.CylinderGeometry(3.2, 4.5, 6, 32),
    new THREE.MeshStandardMaterial({ color: 0x050810, roughness: 1, metalness: 0 })
  );
  recess.rotation.z = Math.PI / 2;
  recess.position.x = -2;
  holeGroup.add(recess);

  // 孔洞金属环
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(3.6, 0.55, 16, 48),
    new THREE.MeshStandardMaterial({
      color: 0x2a3850, roughness: 0.35, metalness: 0.95,
      emissive: 0x0a1828, emissiveIntensity: 0.4,
    })
  );
  ring.rotation.y = Math.PI / 2;
  holeGroup.add(ring);

  // 孔心发光点
  const coreGlow = new THREE.Mesh(
    new THREE.SphereGeometry(1.6, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.9 })
  );
  holeGroup.add(coreGlow);

  const emitterLight = new THREE.PointLight(0x00e8ff, 3.5, 40);
  holeGroup.add(emitterLight);

  // ─── 调参 ───────────────────────────────────────────────────
  const params = {
    laserColor: '#00f0ff',
    particleSize: 1.0,
    emissionSpeed: 280,
    tailLength: 28,
    beamThickness: 1.8,
    bloom: 0.55,
    density: 1.0,
  };

  // ─── 激光粒子池（每条粒子 = 一条带渐变拖尾的四边形条带）────
  const COUNT = 1400;
  const VPT = 4; // 每个粒子 4 顶点
  const positions = new Float32Array(COUNT * VPT * 3);
  const alongs = new Float32Array(COUNT * VPT);
  const widths = new Float32Array(COUNT * VPT);
  const alphas = new Float32Array(COUNT * VPT);
  const indices = new Uint16Array(COUNT * 6);

  for (let i = 0; i < COUNT; i++) {
    const bi = i * 6, vi = i * VPT;
    indices[bi] = vi; indices[bi + 1] = vi + 1; indices[bi + 2] = vi + 2;
    indices[bi + 3] = vi; indices[bi + 4] = vi + 2; indices[bi + 5] = vi + 3;
    for (let j = 0; j < VPT; j++) {
      alongs[vi + j] = j < 2 ? 0 : 1;
      widths[vi + j] = j % 2 === 0 ? -1 : 1;
    }
  }

  const beamGeo = new THREE.BufferGeometry();
  beamGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  beamGeo.setAttribute('aAlong', new THREE.BufferAttribute(alongs, 1));
  beamGeo.setAttribute('aSide', new THREE.BufferAttribute(widths, 1));
  beamGeo.setAttribute('aAlpha', new THREE.BufferAttribute(alphas, 1));
  beamGeo.setIndex(new THREE.BufferAttribute(indices, 1));

  const beamMat = new THREE.ShaderMaterial({
    uniforms: {
      uColor: { value: new THREE.Color(params.laserColor) },
      uColorHi: { value: new THREE.Color('#ffffff') },
      uIntensity: { value: 1.2 },
    },
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    vertexShader: /* glsl */`
      attribute float aAlong;
      attribute float aSide;
      attribute float aAlpha;
      varying float vAlong;
      varying float vSide;
      varying float vAlpha;
      void main() {
        vAlong = aAlong;
        vSide = aSide;
        vAlpha = aAlpha;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: /* glsl */`
      uniform vec3 uColor;
      uniform vec3 uColorHi;
      uniform float uIntensity;
      varying float vAlong;
      varying float vSide;
      varying float vAlpha;
      void main() {
        // 沿激光方向：尾部淡、头部亮
        float head = smoothstep(0.0, 0.25, vAlong);
        float tail = 1.0 - smoothstep(0.55, 1.0, vAlong);
        float along = head * (0.15 + 0.85 * vAlong) * tail;

        // 横截面柔边
        float across = 1.0 - abs(vSide);
        float edge = smoothstep(0.0, 0.85, across);
        edge = pow(edge, 1.6);

        vec3 col = mix(uColor * 0.5, uColorHi, vAlong * vAlong);
        col *= (0.6 + 1.8 * vAlong);

        float alpha = along * edge * vAlpha * uIntensity;
        if (alpha < 0.004) discard;
        gl_FragColor = vec4(col, alpha);
      }
    `,
  });

  const beamMesh = new THREE.Mesh(beamGeo, beamMat);
  beamMesh.frustumCulled = false;
  scene.add(beamMesh);

  // 粒子 CPU 状态
  const particles = Array.from({ length: COUNT }, () => ({
    pos: new THREE.Vector3(),
    travel: 0,
    tailLen: 20,
    width: 1,
    dead: true,
    phase: Math.random(),
  }));

  const perpUp = new THREE.Vector3(0, 1, 0);
  const perpSide = new THREE.Vector3();
  const head = new THREE.Vector3();
  const tail = new THREE.Vector3();
  const tmp = new THREE.Vector3();
  const c0 = new THREE.Vector3();
  const c1 = new THREE.Vector3();
  const c2 = new THREE.Vector3();
  const c3 = new THREE.Vector3();

  function hideParticle(i) {
    const vi = i * VPT;
    for (let j = 0; j < VPT; j++) alphas[vi + j] = 0;
  }

  function writeQuad(i, p) {
    const vi = i * VPT;
    const halfW = p.width * params.particleSize * 0.5;

    perpSide.crossVectors(BEAM_DIR, perpUp).normalize();
    if (perpSide.lengthSq() < 0.01) perpSide.set(0, 0, 1);

    head.copy(p.pos);
    tail.copy(p.pos).addScaledVector(BEAM_DIR, -p.tailLen);

    c0.copy(tail).addScaledVector(perpSide, -halfW);
    c1.copy(tail).addScaledVector(perpSide, halfW);
    c2.copy(head).addScaledVector(perpSide, halfW);
    c3.copy(head).addScaledVector(perpSide, -halfW);

    const fade = 1 - Math.pow(p.travel / MAX_RANGE, 1.4);
    const a = Math.max(0, fade);
    const corners = [c0, c1, c2, c3];

    for (let j = 0; j < VPT; j++) {
      const idx = (vi + j) * 3;
      positions[idx] = corners[j].x;
      positions[idx + 1] = corners[j].y;
      positions[idx + 2] = corners[j].z;
      alphas[vi + j] = a;
    }
  }

  function spawnParticle(i) {
    const p = particles[i];
    const spread = params.beamThickness;
    const r = Math.sqrt(Math.random()) * spread;
    const ang = Math.random() * Math.PI * 2;

    perpSide.crossVectors(BEAM_DIR, perpUp).normalize();
    tmp.crossVectors(perpSide, BEAM_DIR).normalize();

    p.pos.copy(EMITTER)
      .addScaledVector(perpSide, Math.cos(ang) * r)
      .addScaledVector(tmp, Math.sin(ang) * r);

    p.travel = 0;
    p.tailLen = params.tailLength * (0.55 + Math.random() * 0.9);
    p.width = 0.7 + Math.random() * 0.6;
    p.dead = false;
    writeQuad(i, p);
  }

  function isOutOfView(pos) {
    return pos.x > EMITTER.x + MAX_RANGE + 30
      || pos.x < EMITTER.x - 50
      || Math.abs(pos.y - EMITTER.y) > 120
      || Math.abs(pos.z - EMITTER.z) > 120;
  }

  function updateBeam(delta) {
    const speed = params.emissionSpeed;
    const spawnBudget = Math.ceil(COUNT * 0.35 * params.density * delta * (speed / 200));

    for (let n = 0; n < spawnBudget; n++) {
      const idx = Math.floor(Math.random() * COUNT);
      if (particles[idx].dead) spawnParticle(idx);
    }

    for (let i = 0; i < COUNT; i++) {
      const p = particles[i];

      if (p.dead) {
        if (Math.random() < delta * 8 * params.density) spawnParticle(i);
        else hideParticle(i);
        continue;
      }

      p.pos.addScaledVector(BEAM_DIR, speed * delta);
      p.travel += speed * delta;

      if (p.travel >= MAX_RANGE || isOutOfView(p.pos)) {
        p.dead = true;
        hideParticle(i);
        continue;
      }

      writeQuad(i, p);
    }

    beamGeo.attributes.position.needsUpdate = true;
    beamGeo.attributes.aAlpha.needsUpdate = true;
  }

  // ─── 激光核心光晕（半透明渐变圆柱，增强主线连贯感）──────────
  const coreGeo = new THREE.CylinderGeometry(1, 1, MAX_RANGE, 24, 1, true);
  coreGeo.rotateZ(-Math.PI / 2);
  coreGeo.translate(MAX_RANGE * 0.5, 0, 0);

  const coreMat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    uniforms: {
      uColor: { value: new THREE.Color(params.laserColor) },
      uThickness: { value: params.beamThickness },
    },
    vertexShader: /* glsl */`
      varying vec2 vUv;
      varying vec3 vN;
      varying vec3 vView;
      void main() {
        vUv = uv;
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vN = normalize(mat3(modelMatrix) * normal);
        vView = normalize(cameraPosition - wp.xyz);
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: /* glsl */`
      uniform vec3 uColor;
      uniform float uThickness;
      varying vec2 vUv;
      varying vec3 vN;
      varying vec3 vView;
      void main() {
        float fres = pow(1.0 - abs(dot(normalize(vN), normalize(vView))), 2.2);
        float radial = 1.0 - abs(vUv.y - 0.5) * 2.0;
        radial = pow(smoothstep(0.0, 1.0, radial), 2.0);
        float axial = smoothstep(0.0, 0.08, vUv.x) * (1.0 - smoothstep(0.88, 1.0, vUv.x));
        float alpha = radial * fres * axial * 0.22 * (0.6 + uThickness * 0.15);
        vec3 col = uColor * (0.5 + 0.8 * radial);
        gl_FragColor = vec4(col, alpha);
      }
    `,
  });

  const coreBeam = new THREE.Mesh(coreGeo, coreMat);
  coreBeam.position.copy(EMITTER);
  scene.add(coreBeam);

  // 远处靶标（可视化激光终点）
  const target = new THREE.Mesh(
    new THREE.BoxGeometry(4, 36, 36),
    new THREE.MeshStandardMaterial({
      color: 0x7888a0, roughness: 0.55, metalness: 0.55,
      emissive: 0x203040, emissiveIntensity: 0.2,
    })
  );
  target.position.set(EMITTER.x + MAX_RANGE, EMITTER.y, 0);
  target.castShadow = target.receiveShadow = true;
  scene.add(target);

  const hitGlow = new THREE.Mesh(
    new THREE.CircleGeometry(8, 32),
    new THREE.MeshBasicMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.35, side: THREE.DoubleSide })
  );
  hitGlow.position.set(EMITTER.x + MAX_RANGE + 2.1, EMITTER.y, 0);
  hitGlow.rotation.y = Math.PI / 2;
  scene.add(hitGlow);

  // ─── GUI ────────────────────────────────────────────────────
  const gui = new GUI({ title: '激光控制台' });
  gui.addColor(params, 'laserColor').name('激光颜色').onChange((v) => {
    beamMat.uniforms.uColor.value.set(v);
    coreMat.uniforms.uColor.value.set(v);
    coreGlow.material.color.set(v);
    emitterLight.color.set(v);
    hitGlow.material.color.set(v);
  });
  gui.add(params, 'particleSize', 0.3, 3.5, 0.05).name('粒子大小');
  gui.add(params, 'emissionSpeed', 80, 600, 5).name('发射速度');
  gui.add(params, 'tailLength', 6, 80, 1).name('拖尾长度');
  gui.add(params, 'beamThickness', 0.2, 6, 0.1).name('光线粗细')
    .onChange((v) => { coreMat.uniforms.uThickness.value = v; });
  gui.add(params, 'density', 0.3, 2.5, 0.05).name('粒子密度');
  gui.add(params, 'bloom', 0, 1.2, 0.01).name('辉光强度')
    .onChange((v) => { bloomPass.strength = v; });

  // ─── 主循环 ─────────────────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    const delta = Math.min(clock.getDelta(), 0.05);
    const t = clock.elapsedTime;

    updateBeam(delta);

    // 发射孔脉动
    const pulse = 0.75 + Math.sin(t * 12) * 0.25;
    coreGlow.scale.setScalar(0.85 + pulse * 0.2);
    coreGlow.material.opacity = 0.65 + pulse * 0.35;
    emitterLight.intensity = 2.5 + pulse * 1.5;
    hitGlow.material.opacity = 0.2 + pulse * 0.25;

    controls.update();
    composer.render();
    stats.update();
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
  });
</script>

</html>
