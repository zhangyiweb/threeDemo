<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THREE.JS LAB · 项目展示</title>
</head>

<body>
  <canvas id="bg"></canvas>
  <div class="grid-overlay"></div>

  <div id="app">
    <header class="hero">
      <div class="hero-badge">// WebGL · Three.js · Shader</div>
      <h1 class="hero-title">THREE<span class="dot">.</span>JS <span class="accent">LAB</span></h1>
      <p class="hero-sub">交互 3D 实验场 · 点击卡片进入对应项目</p>
      <div class="hero-stats">
        <div class="stat"><b>{{ list.length }}</b><span>PROJECTS</span></div>
        <div class="stat-divider"></div>
        <div class="stat"><b>WebGL</b><span>RENDERER</span></div>
        <div class="stat-divider"></div>
        <div class="stat"><b>GLSL</b><span>SHADERS</span></div>
      </div>
    </header>

    <main class="container">
      <article
        v-for="(item, index) in list"
        :key="index"
        class="card"
        :style="{ animationDelay: (index * 0.08) + 's' }"
        @click="openWeb(item)"
        @mousemove="tilt($event)"
        @mouseleave="resetTilt($event)">
        <span class="corner tl"></span>
        <span class="corner tr"></span>
        <span class="corner bl"></span>
        <span class="corner br"></span>

        <div class="card-media">
          <img :src="setImg(item)" :alt="item.title" loading="lazy" />
          <div class="scanline"></div>
          <div class="card-no">{{ pad(index + 1) }}</div>
        </div>

        <div class="card-body">
          <h3 class="card-title">{{ cleanTitle(item.title) }}</h3>
          <p class="card-desc">{{ item.desc }}</p>
          <div class="tags">
            <span v-for="(t, i) in item.tags" :key="i" class="tag">{{ t }}</span>
          </div>
          <div class="card-enter">
            进入项目
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
      </article>
    </main>

    <footer class="foot">Crafted with Three.js · 张怡</footer>
  </div>
</body>

<script src="https://unpkg.com/vue@2/dist/vue.js"></script>
<script>
  new Vue({
    el: "#app",
    data: function () {
      return {
        list: [
          {
            title: "1.机器人移动",
            desc: "WASD 控制机器人在场景中移动，路障碰撞检测、第三人称相机跟随。",
            tags: ["交互", "碰撞检测", "GLTF"],
          },
          {
            title: "2.机器人移动可移动视角",
            desc: "鼠标自由旋转视角，移动带加减速过渡，机器人朝向移动方向。",
            tags: ["OrbitControls", "运动过渡"],
          },
          {
            title: "3.昼夜天气场景",
            desc: "真实阳光与辉光、24 小时昼夜循环、晴雨雪天气、随机城市场景。",
            tags: ["后处理", "昼夜", "阴影"],
          },
          {
            title: "4.动态天空",
            desc: "自定义着色器渐变蓝天，FBM 程序化白云持续飘动，可 GUI 调参。",
            tags: ["Shader", "FBM", "天空"],
          },
          {
            title: "5.晴阴雷电晚霞天空",
            desc: "一键切换晴天 / 晚霞 / 阴天 / 下雨 / 雷电，含雨幕与随机闪电。",
            tags: ["多天气", "闪电", "雨"],
          },
          {
            title: "6.灰尘雾气",
            desc: "沿风向飘动的灰尘与雾气粒子，带湍流缭绕，GUI 调节风向 / 风力 / 浓度。",
            tags: ["粒子", "湍流", "雾气"],
          },
          {
            title: "7.能量流动",
            desc: "电厂能量可视化：水流 / 热流(蒸汽) / 电流沿管道流光，Bloom 辉光。",
            tags: ["流光", "Bloom", "管道"],
          },
          {
            title: "8.风",
            desc: "程序化电风扇吹出锥形喷射雾气粒子，可调风力 / 扩散 / 雾量 / 摆头。",
            tags: ["粒子", "风扇", "喷射"],
          },
        ],
      };
    },
    methods: {
      openWeb(item) {
        window.open("./" + item.title + ".html");
      },
      setImg(item) {
        let num = item.title.split(".")[0];
        if (item.url) return item.url;
        return `../assets/cover/${num}.png`;
      },
      cleanTitle(title) {
        return title.replace(/^\d+\./, "");
      },
      pad(n) {
        return String(n).padStart(2, "0");
      },
      tilt(e) {
        const card = e.currentTarget;
        const r = card.getBoundingClientRect();
        const px = (e.clientX - r.left) / r.width - 0.5;
        const py = (e.clientY - r.top) / r.height - 0.5;
        card.style.transform =
          `perspective(900px) rotateY(${px * 8}deg) rotateX(${-py * 8}deg) translateY(-6px)`;
        card.style.setProperty("--mx", (px * 100 + 50) + "%");
        card.style.setProperty("--my", (py * 100 + 50) + "%");
      },
      resetTilt(e) {
        e.currentTarget.style.transform = "";
      },
    },
  });

  // ── 粒子网络背景 ──────────────────────────────
  (function () {
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");
    let w, h, particles;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      const count = Math.min(110, Math.floor((w * h) / 16000));
      particles = Array.from({ length: count }, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
      }));
    }

    function step() {
      ctx.clearRect(0, 0, w, h);
      for (const p of particles) {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > w) p.vx *= -1;
        if (p.y < 0 || p.y > h) p.vy *= -1;
      }
      for (let i = 0; i < particles.length; i++) {
        const a = particles[i];
        for (let j = i + 1; j < particles.length; j++) {
          const b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const dist = Math.hypot(dx, dy);
          if (dist < 130) {
            ctx.strokeStyle = `rgba(80, 200, 255, ${0.16 * (1 - dist / 130)})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }
      for (const p of particles) {
        ctx.fillStyle = "rgba(120, 220, 255, 0.7)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.6, 0, Math.PI * 2);
        ctx.fill();
      }
      requestAnimationFrame(step);
    }

    window.addEventListener("resize", resize);
    resize();
    step();
  })();
</script>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #060912;
    --cyan: #39d6ff;
    --purple: #9b6bff;
    --text: #e6f0ff;
    --muted: #8aa0c4;
  }

  /* 滚动条美化（WebKit + Firefox） */
  * {
    scrollbar-width: thin;
    scrollbar-color: rgba(128, 172, 238, 0.55) rgba(8, 12, 22, 0.7);
  }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-thumb {
    background:
      linear-gradient(180deg, rgba(90, 210, 255, 0.65), rgba(155, 107, 255, 0.62));
    border-radius: 999px;
    border: 2px solid rgba(8, 12, 22, 0.75);
    box-shadow: 0 0 8px rgba(57, 214, 255, 0.25);
  }
  *::-webkit-scrollbar-thumb:hover {
    background:
      linear-gradient(180deg, rgba(120, 225, 255, 0.85), rgba(175, 132, 255, 0.82));
  }
  *::-webkit-scrollbar-track {
    background: rgba(8, 12, 22, 0.72);
    border-radius: 999px;
  }

  html, body { min-height: 100%; }

  body {
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(155, 107, 255, 0.18), transparent 60%),
      radial-gradient(1000px 500px at 0% 10%, rgba(57, 214, 255, 0.16), transparent 55%),
      var(--bg);
    color: var(--text);
    font-family: "Segoe UI", -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  #bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.8;
  }

  /* 科技网格叠加 */
  .grid-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(57, 214, 255, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(57, 214, 255, 0.05) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(circle at 50% 30%, #000 0%, transparent 80%);
    -webkit-mask-image: radial-gradient(circle at 50% 30%, #000 0%, transparent 80%);
  }

  #app {
    position: relative;
    z-index: 2;
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 28px 80px;
  }

  /* ── Hero ── */
  .hero {
    text-align: center;
    padding: 80px 0 50px;
  }

  .hero-badge {
    display: inline-block;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--cyan);
    border: 1px solid rgba(57, 214, 255, 0.4);
    border-radius: 999px;
    padding: 6px 16px;
    margin-bottom: 22px;
    background: rgba(57, 214, 255, 0.06);
    box-shadow: 0 0 24px rgba(57, 214, 255, 0.18) inset;
  }

  .hero-title {
    font-size: clamp(40px, 8vw, 86px);
    font-weight: 800;
    letter-spacing: 2px;
    line-height: 1.05;
    background: linear-gradient(120deg, #ffffff 0%, var(--cyan) 45%, var(--purple) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 6px 30px rgba(57, 214, 255, 0.35));
    animation: glowPulse 4s ease-in-out infinite;
  }

  .hero-title .dot { color: var(--cyan); -webkit-text-fill-color: var(--cyan); }
  .hero-title .accent { -webkit-text-fill-color: var(--purple); }

  @keyframes glowPulse {
    0%, 100% { filter: drop-shadow(0 6px 26px rgba(57, 214, 255, 0.3)); }
    50% { filter: drop-shadow(0 6px 40px rgba(155, 107, 255, 0.5)); }
  }

  .hero-sub {
    margin-top: 16px;
    color: var(--muted);
    font-size: 16px;
    letter-spacing: 1px;
  }

  .hero-stats {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 26px;
    margin-top: 34px;
  }

  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat b {
    font-size: 24px;
    color: #fff;
    text-shadow: 0 0 18px rgba(57, 214, 255, 0.6);
  }
  .stat span { font-size: 11px; letter-spacing: 2px; color: var(--muted); margin-top: 4px; }
  .stat-divider { width: 1px; height: 32px; background: linear-gradient(var(--cyan), transparent); }

  /* ── 卡片网格 ── */
  .container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 28px 24px;
    margin-top: 30px;
  }

  .card {
    position: relative;
    border-radius: 14px;
    padding: 10px;
    background: linear-gradient(160deg, rgba(20, 30, 54, 0.75), rgba(10, 16, 32, 0.65));
    border: 1px solid rgba(120, 160, 220, 0.16);
    backdrop-filter: blur(10px);
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.25s ease, box-shadow 0.35s ease, border-color 0.35s ease;
    transform-style: preserve-3d;
    opacity: 0;
    animation: cardIn 0.6s ease forwards;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 鼠标跟随高光 */
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(220px circle at var(--mx, 50%) var(--my, 50%),
      rgba(57, 214, 255, 0.18), transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .card:hover {
    border-color: rgba(57, 214, 255, 0.6);
    box-shadow:
      0 20px 50px rgba(0, 0, 0, 0.55),
      0 0 30px rgba(57, 214, 255, 0.25);
  }
  .card:hover::before { opacity: 1; }

  /* HUD 角标 */
  .corner {
    position: absolute;
    width: 16px;
    height: 16px;
    border: 2px solid var(--cyan);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 3;
  }
  .corner.tl { top: 8px; left: 8px; border-right: 0; border-bottom: 0; }
  .corner.tr { top: 8px; right: 8px; border-left: 0; border-bottom: 0; }
  .corner.bl { bottom: 8px; left: 8px; border-right: 0; border-top: 0; }
  .corner.br { bottom: 8px; right: 8px; border-left: 0; border-top: 0; }
  .card:hover .corner { opacity: 0.9; }

  .card-media {
    position: relative;
    border-radius: 11px;
    overflow: hidden;
    aspect-ratio: 1 / 1;
  }

  .card-media img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.6s ease, filter 0.4s ease;
    filter: saturate(0.9) brightness(0.92);
  }
  .card:hover .card-media img { transform: scale(1.08); filter: saturate(1.15) brightness(1.02); }

  /* 扫描线 */
  .scanline {
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 30%;
    background: linear-gradient(to bottom, rgba(57, 214, 255, 0.25), transparent);
    transform: translateY(-120%);
    opacity: 0;
  }
  .card:hover .scanline {
    opacity: 1;
    animation: scan 1.8s linear infinite;
  }
  @keyframes scan {
    0% { transform: translateY(-120%); }
    100% { transform: translateY(420%); }
  }

  .card-no {
    position: absolute;
    top: 10px;
    left: 12px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--cyan);
    padding: 3px 9px;
    border-radius: 6px;
    background: rgba(6, 12, 24, 0.7);
    border: 1px solid rgba(57, 214, 255, 0.35);
    z-index: 2;
  }

  .card-body { padding: 12px 6px 6px; }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
  }

  .card-desc {
    font-size: 12px;
    line-height: 1.55;
    color: var(--muted);
    min-height: 38px;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 14px 0 6px;
  }
  .tag {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--cyan);
    padding: 3px 10px;
    border-radius: 999px;
    background: rgba(57, 214, 255, 0.08);
    border: 1px solid rgba(57, 214, 255, 0.25);
  }

  .card-enter {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--text);
    transition: gap 0.3s, color 0.3s;
  }
  .card:hover .card-enter { gap: 12px; color: var(--cyan); }

  .foot {
    text-align: center;
    margin-top: 60px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 2px;
  }

  @media (max-width: 600px) {
    .hero { padding: 50px 0 30px; }
    .hero-stats { gap: 16px; }
    .container { grid-template-columns: 1fr; }
  }
</style>

</html>
