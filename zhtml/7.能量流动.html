    margin: 0;

<body>
  <div id="hint">鼠标拖拽观察 · 滚轮缩放 · 右上角面板调节 <b>水流 / 热流 / 电流</b> 速度与浓度</div>
  <div id="container"></div>
</body>

<script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
      }
    }
  </script>

<script type="module">
  import * as THREE from 'three';
  import Stats from 'three/addons/libs/stats.module.js';
  import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
  import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

  // ─── 颜色主题 ───────────────────────────────────────────────
  const COL = {
    water: '#2bd6ff',   // 水流 青蓝
    waterHi: '#d6fbff',
    heat: '#ff6a2b',    // 热流/蒸汽 橙红
    heatHi: '#ffe39a',
    elec: '#8b7bff',    // 电流 紫蓝
    elecHi: '#eafcff',
  };

  const container = document.getElementById('container');
  const clock = new THREE.Clock();

  const scene = new THREE.Scene();
  scene.background = new THREE.Color('#05080f');
  scene.fog = new THREE.FogExp2(0x05080f, 0.0016);

  const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 5000);
  camera.position.set(180, 150, 280);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.5;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);

  // 标签渲染器（覆盖在 WebGL 之上）
  const labelRenderer = new CSS2DRenderer();
  labelRenderer.setSize(innerWidth, innerHeight);
  labelRenderer.domElement.style.position = 'absolute';
  labelRenderer.domElement.style.top = '0';
  labelRenderer.domElement.style.pointerEvents = 'none';
  container.appendChild(labelRenderer.domElement);

  const stats = new Stats();
  container.appendChild(stats.dom);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.maxPolarAngle = Math.PI / 2 - 0.02;
  controls.minDistance = 90;
  controls.maxDistance = 620;
  controls.target.set(20, 30, 0);

  // ─── 灯光 ───────────────────────────────────────────────────
  scene.add(new THREE.HemisphereLight(0xcfe0ff, 0x2a3550, 1.2));
  const key = new THREE.DirectionalLight(0xdcebff, 2.0);
  key.position.set(160, 240, 180);
  key.castShadow = true;
  key.shadow.mapSize.set(2048, 2048);
  key.shadow.camera.near = 1;
  key.shadow.camera.far = 900;
  const sc = 320;
  key.shadow.camera.left = -sc; key.shadow.camera.right = sc;
  key.shadow.camera.top = sc; key.shadow.camera.bottom = -sc;
  key.shadow.bias = -0.0004;
  scene.add(key);
  scene.add(new THREE.AmbientLight(0x4a5a78, 1.1));
  // 补光：从相机方向打亮设备暗面
  const fill = new THREE.DirectionalLight(0x99b4dd, 0.8);
  fill.position.set(-160, 120, -120);
  scene.add(fill);

  // ─── 地面 + 网格 ────────────────────────────────────────────
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(2400, 2400),
    new THREE.MeshStandardMaterial({ color: 0x0a1020, roughness: 0.92, metalness: 0.1 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.1;
  ground.receiveShadow = true;
  scene.add(ground);

  const grid = new THREE.GridHelper(2400, 120, 0x1c3a5e, 0x0f2034);
  grid.position.y = 0;
  grid.material.transparent = true;
  grid.material.opacity = 0.5;
  scene.add(grid);

  // ─── 通用材质 ───────────────────────────────────────────────
  const metalDark = (c = 0x2a3650, rough = 0.55, metal = 0.85) =>
    new THREE.MeshStandardMaterial({ color: c, roughness: rough, metalness: metal });

  const emissive = (c, intensity = 2.0) =>
    new THREE.MeshStandardMaterial({
      color: new THREE.Color(c).multiplyScalar(0.2),
      emissive: new THREE.Color(c),
      emissiveIntensity: intensity,
      roughness: 0.4, metalness: 0.3,
    });

  function addMesh(geo, mat, x, y, z, parent = scene) {
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x, y, z);
    m.castShadow = true;
    m.receiveShadow = true;
    parent.add(m);
    return m;
  }

  // 设备底座
  function base(x, z, r, h = 4, c = 0x1a2336) {
    const b = addMesh(new THREE.CylinderGeometry(r, r * 1.08, h, 48), metalDark(c, 0.7, 0.6), x, h / 2, z);
    return b;
  }

  // 中文标签
  function addLabel(text, color, x, y, z) {
    const el = document.createElement('div');
    el.className = 'label';
    el.style.setProperty('--c', color);
    el.innerHTML = `<span class="dot"></span>${text}`;
    const obj = new CSS2DObject(el);
    obj.position.set(x, y, z);
    scene.add(obj);
    return obj;
  }

  // ════════════════════════════════════════════════════════════
  //  设备建模
  // ════════════════════════════════════════════════════════════
  const spinners = []; // 需要旋转的部件

  // —— 1. 水泵站（左，蓝）——
  (function waterPump() {
    const g = new THREE.Group(); g.position.set(-150, 0, 0); scene.add(g);
    base(-150, 0, 22);
    const tank = addMesh(new THREE.CylinderGeometry(16, 16, 30, 40), metalDark(0x274b63, 0.5, 0.8), -150, 19, 0);
    // 蓝色水位发光环
    for (let i = 0; i < 3; i++)
      addMesh(new THREE.TorusGeometry(16.2, 0.5, 8, 48), emissive(COL.water, 2.4), -150, 10 + i * 6, 0).rotation.x = Math.PI / 2;
    // 顶盖
    addMesh(new THREE.CylinderGeometry(17, 16, 3, 40), metalDark(0x32597a, 0.4, 0.85), -150, 35, 0);
    addMesh(new THREE.SphereGeometry(5, 24, 16), emissive(COL.water, 2.2), -150, 39, 0);
    // 旋转的泵轮
    const wheel = addMesh(new THREE.TorusGeometry(7, 1.4, 8, 24), metalDark(0x3a4e6e, 0.4, 0.9), -150, 6, 22);
    wheel.rotation.y = Math.PI / 2;
    spinners.push({ m: wheel, axis: 'x', s: 2.2 });
    addLabel('水源 · 给水泵', COL.water, -150, 48, 0);
  })();

  // —— 2. 锅炉（热源，红）——
  (function boiler() {
    base(-55, 0, 26, 5, 0x241a1a);
    // 炉体
    const body = addMesh(new THREE.BoxGeometry(34, 60, 34), metalDark(0x3a2a2a, 0.6, 0.7), -55, 32, 0);
    // 炉膛发光条纹
    for (let i = 0; i < 4; i++) {
      const strip = addMesh(new THREE.BoxGeometry(35, 2.2, 35), emissive(COL.heat, 2.6), -55, 16 + i * 12, 0);
    }
    // 炉芯（强发光）
    addMesh(new THREE.BoxGeometry(20, 44, 20), emissive(COL.heat, 1.6), -55, 30, 0);
    // 烟囱
    addMesh(new THREE.CylinderGeometry(4.5, 6, 50, 28), metalDark(0x32363f, 0.7, 0.5), -38, 75, -10);
    addMesh(new THREE.TorusGeometry(5, 0.8, 8, 32), emissive(COL.heat, 2), -38, 99, -10).rotation.x = Math.PI / 2;
    addLabel('锅炉 · 热源', COL.heat, -55, 78, 18);
  })();

  // —— 3. 汽轮机 + 发电机（中，电）——
  let genCore;
  (function turbine() {
    base(45, 0, 30, 5, 0x1a2336);
    // 汽轮机（横卧圆柱）
    const turb = addMesh(new THREE.CylinderGeometry(11, 11, 40, 40), metalDark(0x33405c, 0.45, 0.85), 30, 16, 0);
    turb.rotation.z = Math.PI / 2;
    // 汽轮机叶轮组（旋转发光盘）
    for (let i = -1; i <= 1; i++) {
      const disc = addMesh(new THREE.TorusGeometry(11.5, 1.2, 8, 40), emissive(COL.heat, 1.8), 30 + i * 12, 16, 0);
      disc.rotation.y = Math.PI / 2;
      spinners.push({ m: disc, axis: 'x', s: 5 });
    }
    // 联轴 + 发电机
    addMesh(new THREE.CylinderGeometry(3, 3, 14, 20), metalDark(0x4a5675, 0.4, 0.9), 56, 16, 0).rotation.z = Math.PI / 2;
    const gen = addMesh(new THREE.CylinderGeometry(13, 13, 28, 44), metalDark(0x2c3a55, 0.4, 0.9), 76, 16, 0);
    gen.rotation.z = Math.PI / 2;
    // 发电机电磁发光环
    for (let i = -1; i <= 1; i++) {
      addMesh(new THREE.TorusGeometry(13.4, 0.7, 8, 48), emissive(COL.elec, 2.6), 76 + i * 9, 16, 0).rotation.y = Math.PI / 2;
    }
    genCore = addMesh(new THREE.CylinderGeometry(6, 6, 26, 32), emissive(COL.elec, 1.4), 76, 16, 0);
    genCore.rotation.z = Math.PI / 2;
    spinners.push({ m: genCore, axis: 'x', s: 8 });
    addLabel('汽轮机 → 发电机', COL.elec, 50, 42, 0);
  })();

  // —— 4. 变压器（右，电）——
  (function transformer() {
    base(150, 0, 24, 5, 0x1a2336);
    const body = addMesh(new THREE.BoxGeometry(34, 30, 28), metalDark(0x2e3a52, 0.5, 0.8), 150, 19, 0);
    // 散热片
    for (let i = 0; i < 6; i++)
      addMesh(new THREE.BoxGeometry(2, 26, 30), metalDark(0x394a68, 0.5, 0.85), 134 + i * 6.4, 19, 0);
    // 高压瓷瓶 + 接线柱（发光）
    for (let i = -1; i <= 1; i++) {
      addMesh(new THREE.CylinderGeometry(2.4, 3.2, 16, 20), metalDark(0x9fb0c8, 0.3, 0.4), 150 + i * 10, 42, 0);
      addMesh(new THREE.SphereGeometry(2.4, 20, 16), emissive(COL.elec, 3), 150 + i * 10, 51, 0);
    }
    addLabel('变压器 · 升压', COL.elec, 150, 64, 0);
  })();

  // —— 5. 冷却塔（后方，蒸汽）——
  let towerVapor;
  (function coolingTower() {
    base(-55, -110, 40, 6, 0x182030);
    // 双曲线轮廓
    const pts = [];
    for (let i = 0; i <= 20; i++) {
      const t = i / 20;
      const y = t * 90;
      const r = 36 - 18 * Math.sin(t * Math.PI * 0.62) + 10 * t;
      pts.push(new THREE.Vector2(Math.max(r, 16), y));
    }
    const tower = addMesh(new THREE.LatheGeometry(pts, 60), 
      new THREE.MeshStandardMaterial({ color: 0x223044, roughness: 0.85, metalness: 0.2, side: THREE.DoubleSide }),
      -55, 6, -110);
    addLabel('冷却塔', COL.water, -55, 104, -110);
  })();

  // —— 6. 输电塔（最右，电流飞出）——
  function buildPylon(x, z) {
    const g = new THREE.Group(); g.position.set(x, 0, z); scene.add(g);
    const mat = metalDark(0x3a4863, 0.5, 0.7);
    const beam = (x1, y1, z1, x2, y2, z2, r = 0.8) => {
      const a = new THREE.Vector3(x1, y1, z1), b = new THREE.Vector3(x2, y2, z2);
      const len = a.distanceTo(b);
      const m = new THREE.Mesh(new THREE.CylinderGeometry(r, r, len, 8), mat);
      m.position.copy(a).add(b).multiplyScalar(0.5);
      m.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), b.clone().sub(a).normalize());
      m.castShadow = true; g.add(m);
    };
    const w0 = 14, w1 = 4, H = 78;
    // 四条主腿
    const legs = [[-1, -1], [1, -1], [-1, 1], [1, 1]];
    legs.forEach(([sx, sz]) => beam(sx * w0, 0, sz * w0, sx * w1, H, sz * w1, 1.2));
    // 横撑
    for (let i = 1; i <= 5; i++) {
      const t = i / 6, y = t * H, w = w0 + (w1 - w0) * t;
      beam(-w, y, -w, w, y, -w, 0.5); beam(-w, y, w, w, y, w, 0.5);
      beam(-w, y, -w, -w, y, w, 0.5); beam(w, y, -w, w, y, w, 0.5);
    }
    // 顶部横担
    beam(-26, H, 0, 26, H, 0, 1.2);
    beam(-20, H + 14, 0, 20, H + 14, 0, 1.0);
    beam(0, H, 0, 0, H + 14, 0, 1.0);
    // 绝缘子挂点发光
    [-26, -20, 20, 26].forEach(px => addMesh(new THREE.SphereGeometry(1.6, 16, 12), emissive(COL.elec, 3), px, H - 2, 0, g));
    [-20, 0, 20].forEach(px => addMesh(new THREE.SphereGeometry(1.4, 16, 12), emissive(COL.elec, 3), px, H + 12, 0, g));
    return g;
  }
  buildPylon(250, 0);
  buildPylon(360, 60);
  addLabel('输电 · 升压外送', COL.elec, 250, 100, 0);

  // ════════════════════════════════════════════════════════════
  //  能量流动：流光管道 + 流动粒子
  // ════════════════════════════════════════════════════════════
  const flows = [];          // 管道流光材质集合（按类型）
  const flowGroups = { water: [], heat: [], elec: [] };
  const particleSystems = [];

  // 流光管道着色器：沿管道长度方向跑动的彗星脉冲 + 边缘菲涅尔辉光
  function makeFlowMaterial(color, colorHi, density) {
    return new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      side: THREE.DoubleSide,
      uniforms: {
        uTime: { value: 0 },
        uSpeed: { value: 1 },
        uColor: { value: new THREE.Color(color) },
        uColorHi: { value: new THREE.Color(colorHi) },
        uDensity: { value: density },
        uIntensity: { value: 1 },
      },
      vertexShader: /* glsl */`
        varying vec2 vUv;
        varying vec3 vN;
        varying vec3 vView;
        void main() {
          vUv = uv;
          vec4 wp = modelMatrix * vec4(position, 1.0);
          vN = normalize(mat3(modelMatrix) * normal);
          vView = normalize(cameraPosition - wp.xyz);
          gl_Position = projectionMatrix * viewMatrix * wp;
        }
      `,
      fragmentShader: /* glsl */`
        uniform float uTime, uSpeed, uDensity, uIntensity;
        uniform vec3 uColor, uColorHi;
        varying vec2 vUv;
        varying vec3 vN;
        varying vec3 vView;
        void main() {
          float fres = pow(1.0 - abs(dot(normalize(vN), normalize(vView))), 1.6);
          // 沿轴向跑动的脉冲（uv.x 为管道长度方向）
          float f = fract(vUv.x * uDensity - uTime * uSpeed);
          float comet = pow(f, 3.0);           // 彗星头亮、尾淡
          float core = smoothstep(0.85, 1.0, f); // 锐利亮点
          vec3 col = mix(uColor, uColorHi, comet * 0.8 + core);
          float glow = (0.18 + 0.82 * comet) * (0.35 + 0.65 * fres);
          glow += core * 0.6;
          gl_FragColor = vec4(col * (0.7 + 1.6 * comet + core), glow * uIntensity);
        }
      `,
    });
  }

  // 暗色底管（让没亮的地方也有形体）
  function makeBaseTube(curve, radius) {
    const geo = new THREE.TubeGeometry(curve, 120, radius, 14, false);
    const mat = new THREE.MeshStandardMaterial({ color: 0x10182a, roughness: 0.6, metalness: 0.7 });
    const m = new THREE.Mesh(geo, mat);
    m.castShadow = true;
    scene.add(m);
    return m;
  }

  // 沿曲线流动的发光粒子（彗星点）
  function makeFlowParticles(curve, type, color, count, speed, size, spread) {
    const positions = new Float32Array(count * 3);
    const offsets = new Float32Array(count);   // 沿曲线进度 [0,1)
    const rand = new Float32Array(count);
    for (let i = 0; i < count; i++) {
      offsets[i] = Math.random();
      rand[i] = Math.random();
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.ShaderMaterial({
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
      uniforms: {
        uColor: { value: new THREE.Color(color) },
        uSize: { value: size },
        uTex: { value: sparkTex },
      },
      vertexShader: /* glsl */`
        uniform float uSize;
        attribute float aRand;
        varying float vR;
        void main() {
          vR = aRand;
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = uSize * (1.0 + aRand) * (300.0 / -mv.z);
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: /* glsl */`
        uniform vec3 uColor;
        uniform sampler2D uTex;
        varying float vR;
        void main() {
          vec4 t = texture2D(uTex, gl_PointCoord);
          gl_FragColor = vec4(uColor * (1.4 + vR), t.a);
        }
      `,
    });
    geo.setAttribute('aRand', new THREE.BufferAttribute(rand, 1));
    const pts = new THREE.Points(geo, mat);
    pts.frustumCulled = false;
    scene.add(pts);
    const sys = { curve, geo, offsets, count, speed, spread, type, rand };
    particleSystems.push(sys);
    return sys;
  }

  // 圆形柔光贴图（粒子）
  function makeSparkTexture() {
    const s = 64, cv = document.createElement('canvas'); cv.width = cv.height = s;
    const ctx = cv.getContext('2d');
    const g = ctx.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
    g.addColorStop(0, 'rgba(255,255,255,1)');
    g.addColorStop(0.3, 'rgba(255,255,255,0.8)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
    const tex = new THREE.CanvasTexture(cv);
    return tex;
  }
  const sparkTex = makeSparkTexture();

  // 创建一条完整流动通道：底管 + 流光层 + 流动粒子
  function createFlow(type, points, opts = {}) {
    const {
      radius = 2.2, density = 5, speed = 1, particleCount = 40,
      particleSize = 16, glowScale = 1.35,
    } = opts;
    const colorMap = {
      water: [COL.water, COL.waterHi],
      heat: [COL.heat, COL.heatHi],
      elec: [COL.elec, COL.elecHi],
    };
    const [c, cHi] = colorMap[type];
    const curve = new THREE.CatmullRomCurve3(points.map(p => new THREE.Vector3(...p)));
    curve.curveType = 'catmullrom';
    curve.tension = 0.4;

    makeBaseTube(curve, radius);
    // 流光层（略大半径，叠加发光）
    const geo = new THREE.TubeGeometry(curve, 140, radius * glowScale, 16, false);
    const mat = makeFlowMaterial(c, cHi, density);
    mat.uniforms.uSpeed.value = speed;
    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh);

    const sys = makeFlowParticles(curve, type, cHi, particleCount, speed, particleSize, radius * 0.6);
    flowGroups[type].push({ mat, sys, baseSpeed: speed, density });
    flows.push(mat);
    return { mat, sys };
  }

  // ─── 管道布线 ───────────────────────────────────────────────
  // 水流：水泵 → 锅炉底部给水（两根并行）
  createFlow('water', [[-150, 12, 6], [-110, 10, 8], [-80, 9, 8], [-60, 9, 6]], { radius: 2.4, density: 4, speed: 0.9, particleCount: 36 });
  createFlow('water', [[-150, 12, -6], [-110, 10, -8], [-80, 9, -8], [-60, 9, -6]], { radius: 2.0, density: 5, speed: 0.75, particleCount: 28 });
  // 冷却循环水：冷却塔 ↔ 汽轮机（回水）
  createFlow('water', [[-55, 12, -86], [-20, 11, -60], [20, 11, -30], [45, 12, -22]], { radius: 2.2, density: 4, speed: 0.6, particleCount: 30 });

  // 热流/蒸汽：锅炉顶部 → 汽轮机进汽（高架主蒸汽管）
  createFlow('heat', [[-55, 60, -4], [-55, 70, -4], [-20, 64, -2], [10, 40, 0], [30, 26, 0]], { radius: 3.0, density: 4, speed: 1.6, particleCount: 50, glowScale: 1.4 });
  createFlow('heat', [[-55, 56, 8], [-30, 52, 8], [0, 40, 6], [30, 26, 4]], { radius: 2.2, density: 5, speed: 1.3, particleCount: 34 });

  // 电流：发电机 → 变压器 → 输电塔 → 远塔
  createFlow('elec', [[90, 16, 8], [120, 18, 8], [150, 30, 6], [150, 44, 2]], { radius: 1.8, density: 7, speed: 2.6, particleCount: 44 });
  createFlow('elec', [[90, 16, -8], [118, 18, -8], [148, 30, -4], [150, 44, -2]], { radius: 1.6, density: 8, speed: 2.9, particleCount: 40 });
  // 架空线：变压器 → 塔1 → 塔2（带弧垂）
  [-26, 0, 26].forEach((zoff, i) => {
    const y = 44;
    createFlow('elec', [
      [150 + (i - 1) * 6, y, zoff * 0.2],
      [200, 70, zoff * 0.5],
      [250, 76, zoff],
      [305, 60, (zoff + 60) * 0.6],
      [360, 74, zoff + 60],
    ], { radius: 1.2, density: 9, speed: 3.4, particleCount: 30, glowScale: 1.5 });
  });

  // ─── 上升蒸汽 / 水汽粒子（冷却塔 & 锅炉烟囱）─────────────────
  function makeRisingVapor(x, y, z, count, radius, color, rise) {
    const pos = new Float32Array(count * 3);
    const data = []; // {x,z,phase,life}
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2, r = Math.random() * radius;
      data.push({ ox: Math.cos(a) * r, oz: Math.sin(a) * r, life: Math.random(), spd: 0.5 + Math.random() });
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mat = new THREE.ShaderMaterial({
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
      uniforms: { uColor: { value: new THREE.Color(color) }, uTex: { value: sparkTex }, uSize: { value: 60 } },
      vertexShader: `uniform float uSize; attribute float aLife; varying float vL;
        void main(){ vL=aLife; vec4 mv=modelViewMatrix*vec4(position,1.0);
        gl_PointSize=uSize*(0.5+aLife)*(300.0/-mv.z); gl_Position=projectionMatrix*mv; }`,
      fragmentShader: `uniform vec3 uColor; uniform sampler2D uTex; varying float vL;
        void main(){ vec4 t=texture2D(uTex,gl_PointCoord);
        float a=t.a*(1.0-vL)*0.5; gl_FragColor=vec4(uColor,a); }`,
    });
    const life = new Float32Array(count);
    geo.setAttribute('aLife', new THREE.BufferAttribute(life, 1));
    const pts = new THREE.Points(geo, mat); pts.frustumCulled = false; scene.add(pts);
    return { geo, data, count, base: { x, y, z }, rise, life };
  }
  const vapors = [
    makeRisingVapor(-55, 96, -110, 140, 24, 0xcfe6ff, 60),  // 冷却塔水汽
    makeRisingVapor(-38, 100, -10, 50, 5, 0xffcaa0, 50),    // 烟囱热气
  ];

  // ─── GUI ────────────────────────────────────────────────────
  const params = {
    water: 1.0, heat: 1.0, elec: 1.0,
    glow: 1.0, bloom: 0.1, paused: false,
  };
  const gui = new GUI();
  gui.title('能量流动控制台');
  const fSpeed = gui.addFolder('流速');
  fSpeed.add(params, 'water', 0, 3, 0.05).name('水流');
  fSpeed.add(params, 'heat', 0, 3, 0.05).name('热流(蒸汽)');
  fSpeed.add(params, 'elec', 0, 4, 0.05).name('电流');
  fSpeed.open();
  const fVis = gui.addFolder('视觉');
  fVis.add(params, 'glow', 0.2, 2.5, 0.05).name('流光强度');
  fVis.add(params, 'bloom', 0, 2.5, 0.05).name('辉光').onChange(v => bloomPass.strength = v);
  fVis.add(params, 'paused').name('暂停流动');
  fVis.open();

  // ─── 后处理（辉光）────────────────────────────────────────
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.1, 0.7, 0.0);
  bloomPass.strength = params.bloom;
  composer.addPass(bloomPass);
  composer.addPass(new OutputPass());

  // ─── 主循环 ─────────────────────────────────────────────────
  const tmp = new THREE.Vector3();
  function animate() {
    requestAnimationFrame(animate);
    const delta = Math.min(clock.getDelta(), 0.05);
    const t = clock.elapsedTime;
    const dt = params.paused ? 0 : delta;

    // 旋转部件
    for (const s of spinners) s.m.rotation[s.axis] += s.s * dt;

    // 更新流光材质
    const typeSpeed = { water: params.water, heat: params.heat, elec: params.elec };
    for (const key in flowGroups) {
      for (const f of flowGroups[key]) {
        f.mat.uniforms.uTime.value = t;
        f.mat.uniforms.uSpeed.value = f.baseSpeed * typeSpeed[key];
        f.mat.uniforms.uIntensity.value = params.glow;
      }
    }

    // 更新流动粒子（沿曲线前进）
    for (const sys of particleSystems) {
      const arr = sys.geo.attributes.position.array;
      const sp = typeSpeed[sys.type] * sys.speed * 0.18 * dt;
      for (let i = 0; i < sys.count; i++) {
        sys.offsets[i] = (sys.offsets[i] + sp + (sys.rand[i] * 0.0002)) % 1;
        if (sys.offsets[i] < 0) sys.offsets[i] += 1;
        sys.curve.getPointAt(sys.offsets[i], tmp);
        const r = sys.spread;
        arr[i * 3] = tmp.x + (sys.rand[i] - 0.5) * r;
        arr[i * 3 + 1] = tmp.y + (Math.sin(t * 3 + sys.rand[i] * 10)) * r * 0.4;
        arr[i * 3 + 2] = tmp.z + (sys.rand[i] - 0.5) * r;
      }
      sys.geo.attributes.position.needsUpdate = true;
    }

    // 上升蒸汽
    for (const v of vapors) {
      const arr = v.geo.attributes.position.array;
      const life = v.geo.attributes.aLife.array;
      for (let i = 0; i < v.count; i++) {
        const d = v.data[i];
        d.life += dt * 0.12 * d.spd;
        if (d.life > 1) d.life -= 1;
        const drift = d.life * v.rise;
        arr[i * 3] = v.base.x + d.ox + Math.sin(t + i) * 3 * d.life;
        arr[i * 3 + 1] = v.base.y + drift;
        arr[i * 3 + 2] = v.base.z + d.oz + Math.cos(t + i) * 3 * d.life;
        life[i] = d.life;
      }
      v.geo.attributes.position.needsUpdate = true;
      v.geo.attributes.aLife.needsUpdate = true;
    }

    // 发电机芯随电流脉动
    if (genCore) {
      const p = 1 + Math.sin(t * 8) * 0.15 * params.elec;
      genCore.material.emissiveIntensity = 1.4 * p;
    }

    controls.update();
    composer.render();
    labelRenderer.render(scene, camera);
    stats.update();
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
    labelRenderer.setSize(innerWidth, innerHeight);
  });
</script>
