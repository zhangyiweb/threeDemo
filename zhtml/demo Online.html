<style>
  * {
    margin: 0;
    padding: 0;
    overflow: hidden;
    box-sizing: border-box;

  .box {
    position: absolute;
    right: 100px;
    top: 200px;
    z-index: 9;

<body>
  <div class="box">
    <div>click</div>
  </div>
  <div id="container"></div>
</body>
<script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.0/examples/jsm/",

<script type="module">
  import * as THREE from 'three';
  import Stats from 'three/addons/libs/stats.module.js';
  import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
  import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';
  import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

  const container = document.getElementById("container");
  const gui = new GUI();

  let clock = new THREE.Clock();

  let scene = new THREE.Scene();
  scene.background = new THREE.Color("#7DD5EE");

  let stats = new Stats();
  container.appendChild(stats.dom);

  var axes = new THREE.AxesHelper(100);
  scene.add(axes);

  let camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 1, 5000);
  camera.position.set(0, 200, 400);

  let renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, logarithmicDepthBuffer: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  container.appendChild(renderer.domElement);
  renderer.outputEncoding = THREE.sRGBEncoding;

  const light = new THREE.HemisphereLight(0xffffbb, 0x080820, 1);
  scene.add(light);

  let controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.target.set(0, 0, 0);

  // const geometry = new THREE.BoxGeometry(1, 1, 1);
  // const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
  // const cube = new THREE.Mesh(geometry, material);
  // scene.add(cube);

  const material = new THREE.ShaderMaterial({
    side: THREE.DoubleSide,
    transparent: true,
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
    fragmentShader: `
          uniform float uTime;
          varying vec2 vUv;
          void main() {
            gl_FragColor = vec4(0.5, 0.0, 1.0, 1.0);
          }
        `,
  });
  const geometry = new THREE.PlaneGeometry(200, 200, 32, 32);
  const plane = new THREE.Mesh(geometry, material);
  scene.add(plane);

  // const dracoLoader = new DRACOLoader();
  // dracoLoader.setDecoderPath("/jsmlist/jsm179/libs/draco/");

  // const loader = new GLTFLoader();
  // loader.setDRACOLoader(dracoLoader);
  // loader.load("", function (gltf) {
  //   scene.add(gltf.scene);
  // });

  function animate(time) {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
    controls.update();
    stats.update();
  }
  animate();

  window.addEventListener("resize", onWindowResize, false);

  /* 窗口变动触发 */
  function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }

  window.addEventListener("click", onMouseClick, false);

  function onMouseClick(event) {
    event.stopPropagation();
    let obj = getClickModel(event);
    console.log(scene);
    console.log(camera.position);
    console.log(controls.target);
    if (!obj) return;
    console.log(obj, obj.name);
  }

  function getClickModel(event) {
    var intersects = getIntersects(event);
    if (intersects.length !== 0) {
      return intersects.find((intersect) => intersect.object.visible && intersect.object.isMesh && intersect.object.name)?.object || false;
      //   let mesh;
      //   for (var i = 0; i < intersects.length; i++) {
      //     if (intersects[i].object.visible && intersects[i].object.type === "Mesh" && intersects[i].object.name) {
      //       // 只对可见的物体进行处理
      //       mesh = intersects[i].object;
      //       break;
      //     }
      //   }
      //   if (mesh) {
      //     return mesh;
      //   } else {
      //     return false;
      //   }
      //   // return intersects[0].object;
      // } else {
      //   return false;
    }
  }

  function getIntersects(event) {
    event.preventDefault();
    var raycaster = new THREE.Raycaster();
    var mouse = new THREE.Vector2();
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    var intersects = raycaster.intersectObjects(scene.children, true);
    return intersects;
  }

  document.querySelectorAll(".box>div").forEach((item) => {
    item.addEventListener("click", () => {
      if (item.innerHTML === "click") {
        console.log(111);
      }
    });
  });
</script>

</html>
