<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>材质特效集锦</title>
  <style>

<body>
  <div id="hint">
    拖拽旋转 · 滚轮缩放<br />
    <b>左</b> 材质特效（55） &nbsp;·&nbsp; <b>右</b> 能流光线（55）
  </div>
  <div id="container"></div>
</body>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.0/examples/jsm/"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import Stats from 'three/addons/libs/stats.module.js';
  import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
  import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

  const container = document.getElementById('container');
  const timer = new THREE.Timer();
  timer.connect(document);
  const uniforms = { uTime: { value: 0 } };

  const params = {
    bloomStrength: 0.15,
    bloomThreshold: 0.18,
    bloomRadius: 0.42,
  };

  const MAT_ZONE_X = -13;
  const FLOW_ZONE_X = 13;
  const ZONE_COLS = 5;
  const ZONE_SPACING = 5.2;
  const DISPLAY_Y = 0.92;
  const LABEL_Y = 0.04;

  // ─── 通用 Shader 片段 ───────────────────────────────────────
  const NOISE_GLSL = `
    float hash(vec3 p) {
      p = fract(p * 0.3183099 + vec3(0.1, 0.2, 0.3));
      p *= 17.0;
      return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
    }
    float noise3(vec3 p) {
      vec3 i = floor(p);
      vec3 f = fract(p);
      f = f * f * (3.0 - 2.0 * f);
      return mix(
        mix(mix(hash(i), hash(i + vec3(1,0,0)), f.x),
            mix(hash(i + vec3(0,1,0)), hash(i + vec3(1,1,0)), f.x), f.y),
        mix(mix(hash(i + vec3(0,0,1)), hash(i + vec3(1,0,1)), f.x),
            mix(hash(i + vec3(0,1,1)), hash(i + vec3(1,1,1)), f.x), f.y), f.z);
    }
    float fbm(vec3 p) {
      float v = 0.0; float a = 0.5;
      for (int i = 0; i < 5; i++) { v += a * noise3(p); p *= 2.1; a *= 0.5; }
      return v;
    }
  `;

  const VARYINGS = `
    varying vec3 vNormal;
    varying vec3 vView;
    varying vec3 vWorld;
    varying vec2 vUv;
  `;

  const VERT_BASE = `
    ${VARYINGS}
    void main() {
      vUv = uv;
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorld = wp.xyz;
      vNormal = normalize(normalMatrix * normal);
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      vView = -mv.xyz;
      gl_Position = projectionMatrix * mv;
    }
  `;

  const VERT_WAVE = `
    uniform float uTime;
    ${VARYINGS}
    void main() {
      vUv = uv;
      vec3 pos = position;
      float w = sin(pos.x * 3.0 + uTime * 2.0) * 0.12
              + sin(pos.y * 4.0 + uTime * 1.6) * 0.08;
      pos += normal * w;
      vec4 wp = modelMatrix * vec4(pos, 1.0);
      vWorld = wp.xyz;
      vNormal = normalize(normalMatrix * normal);
      vec4 mv = modelViewMatrix * vec4(pos, 1.0);
      vView = -mv.xyz;
      gl_Position = projectionMatrix * mv;
    }
  `;

  const VERT_DIR = `
    varying vec3 vDir;
    ${VARYINGS}
    void main() {
      vUv = uv;
      vDir = normalize(position);
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorld = wp.xyz;
      vNormal = normalize(normalMatrix * normal);
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      vView = -mv.xyz;
      gl_Position = projectionMatrix * mv;
    }
  `;

  function shaderMat(frag, opts = {}) {
    return new THREE.ShaderMaterial({
      uniforms: {
        uTime: uniforms.uTime,
        ...opts.uniforms,
      },
      vertexShader: opts.vertexShader ?? VERT_BASE,
      fragmentShader: frag,
      transparent: opts.transparent ?? false,
      side: opts.side ?? THREE.FrontSide,
      depthWrite: opts.depthWrite ?? true,
      blending: opts.blending ?? THREE.NormalBlending,
    });
  }

  function makeMatcapTexture() {
    const cvs = document.createElement('canvas');
    cvs.width = cvs.height = 256;
    const ctx = cvs.getContext('2d');
    const g = ctx.createRadialGradient(80, 70, 10, 128, 128, 128);
    g.addColorStop(0, '#ffffff');
    g.addColorStop(0.35, '#88ccff');
    g.addColorStop(0.7, '#2244aa');
    g.addColorStop(1, '#0a1020');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 256, 256);
    const tex = new THREE.CanvasTexture(cvs);
    tex.colorSpace = THREE.SRGBColorSpace;
    return tex;
  }

  const matcapTex = makeMatcapTexture();

  // ─── 50 种效果定义 ──────────────────────────────────────────
  const EFFECT_DEFS = [
    {
      name: '菲涅尔',
      sub: 'Fresnel',
      geo: 'sphere',
      mat: () => shaderMat(`
        uniform float uTime;
        ${VARYINGS}
        void main() {
          vec3 n = normalize(vNormal);
          vec3 v = normalize(vView);
          float f = pow(1.0 - max(dot(n, v), 0.0), 3.0);
          vec3 base = vec3(0.05, 0.12, 0.28);
          vec3 rim = vec3(0.2, 0.85, 1.0);
          gl_FragColor = vec4(mix(base, rim, f), 1.0);
        }
      `),
    },
    {
      name: '全息',
      sub: 'Hologram',
      geo: 'icosa',
      mat: () => shaderMat(`
        uniform float uTime;
        ${VARYINGS}
        void main() {
          vec3 n = normalize(vNormal);
          vec3 v = normalize(vView);
          float fres = pow(1.0 - max(dot(n, v), 0.0), 2.0);
          float scan = sin(vWorld.y * 80.0 - uTime * 4.0) * 0.5 + 0.5;
          float band = smoothstep(0.35, 0.65, scan);
          float flicker = 0.85 + 0.15 * sin(uTime * 20.0);
          vec3 col = vec3(0.1, 0.9, 1.0) * (fres * 1.4 + band * 0.35) * flicker;
          float alpha = fres * 0.75 + band * 0.25;
          gl_FragColor = vec4(col, alpha * 0.85);
        }
      `, { transparent: true, depthWrite: false, blending: THREE.AdditiveBlending }),
    },
    {
      name: '边缘光',
      sub: 'Rim Light',
      geo: 'torus',
      mat: () => shaderMat(`
        ${VARYINGS}
        void main() {
          vec3 n = normalize(vNormal);
          vec3 v = normalize(vView);
          float rim = smoothstep(0.45, 1.0, 1.0 - dot(n, v));
          vec3 col = vec3(1.0, 0.45, 0.1) * rim * 2.2;
          gl_FragColor = vec4(col, rim);
        }
      `, { transparent: true, depthWrite: false, blending: THREE.AdditiveBlending }),
    },
    {
      name: '溶解',
      sub: 'Dissolve',
      geo: 'knot',
      mat: () => shaderMat(`
        uniform float uTime;
        ${NOISE_GLSL}
        ${VARYINGS}
        void main() {
          float n = fbm(vWorld * 2.5);
          float edge = fract(uTime * 0.25);
          float d = n - edge;
          if (d < 0.0) discard;
          float glow = smoothstep(0.0, 0.08, d);
          vec3 col = mix(vec3(1.0, 0.35, 0.05), vec3(0.2, 0.5, 0.9), 1.0 - glow);
          gl_FragColor = vec4(col, 1.0);
        }
      `),
    },
    {
      name: '卡通',
      sub: 'Toon / Cel',
      geo: 'sphere',
      mat: () => shaderMat(`
        ${VARYINGS}
        void main() {
          vec3 n = normalize(vNormal);
          vec3 l = normalize(vec3(0.6, 1.0, 0.4));
          float ndl = dot(n, l) * 0.5 + 0.5;
          float step1 = step(0.25, ndl);
          float step2 = step(0.55, ndl);
          float step3 = step(0.8, ndl);
          vec3 col = vec3(0.12, 0.18, 0.35);
          if (step1 > 0.5) col = vec3(0.25, 0.38, 0.65);
          if (step2 > 0.5) col = vec3(0.45, 0.62, 0.95);
          if (step3 > 0.5) col = vec3(0.75, 0.88, 1.0);
          gl_FragColor = vec4(col, 1.0);
        }
      `),
    },
    {
      name: '彩虹膜',
      sub: 'Iridescent',
      geo: 'torusKnot',
      mat: () => shaderMat(`
        ${VARYINGS}
        void main() {
          vec3 n = normalize(vNormal);
          vec3 v = normalize(vView);
          float fres = pow(1.0 - max(dot(n, v), 0.0), 1.8);
          float hue = fres * 2.5 + n.y * 0.5 + vWorld.x * 0.1;
          vec3 col = 0.5 + 0.5 * cos(6.283 * (hue + vec3(0.0, 0.33, 0.67)));
          gl_FragColor = vec4(col * (0.4 + fres * 0.9), 1.0);
        }
      `),
    },
    {
      name: '玻璃',
      sub: 'Transmission',
      geo: 'sphere',
      mat: () => new THREE.MeshPhysicalMaterial({
        color: 0xaaddff,
        metalness: 0,
        roughness: 0.05,
        transmission: 1,
        thickness: 1.2,
        ior: 1.45,
        envMapIntensity: 1.2,
      }),
    },
    {
      name: 'Matcap',
      sub: '材质捕获',
      geo: 'icosa',
      mat: () => new THREE.MeshMatcapMaterial({
        matcap: matcapTex,
        color: 0xffffff,
      }),
    },
    {
      name: '能量流动',
      sub: 'Flow UV',
      geo: 'box',
      mat: () => shaderMat(`
        uniform float uTime;
        ${VARYINGS}
        void main() {
          float flow = fract(vUv.y * 6.0 - uTime * 1.5);
          float stripe = smoothstep(0.35, 0.5, flow) * (1.0 - smoothstep(0.5, 0.65, flow));
          vec3 base = vec3(0.04, 0.08, 0.18);
          vec3 emis = vec3(0.1, 0.85, 1.0) * stripe * 2.5;
          gl_FragColor = vec4(base + emis, 1.0);
        }
      `),
    },
    {
      name: '线框发光',
      sub: 'Wireframe',
      geo: 'icosa',
      mat: () => new THREE.MeshBasicMaterial({
        color: 0x44eeff,
        wireframe: true,
        transparent: true,
        opacity: 0.95,
      }),
    },
    {
      name: '顶点波动',
      sub: 'Vertex Wave',
      geo: 'sphere',
      mat: () => shaderMat(`
        uniform float uTime;
        ${VARYINGS}
        void main() {
          vec3 col = vec3(0.3, 0.7, 1.0) * (0.5 + 0.5 * sin(uTime * 2.0 + vWorld.y * 3.0));
          gl_FragColor = vec4(col, 1.0);
        }
      `, { vertexShader: VERT_WAVE }),
    },
    {
      name: '三平面映射',
      sub: 'Triplanar',
      geo: 'box',
      mat: () => shaderMat(`
        ${NOISE_GLSL}
        ${VARYINGS}
        void main() {
          vec3 n = abs(normalize(vNormal));
          n /= (n.x + n.y + n.z);
          float wx = fbm(vWorld * 2.0 + vec3(0.0));
          float wy = fbm(vWorld * 2.0 + vec3(19.0));
          float wz = fbm(vWorld * 2.0 + vec3(47.0));
          float m = wx * n.x + wy * n.y + wz * n.z;
          vec3 col = mix(vec3(0.15, 0.22, 0.35), vec3(0.55, 0.75, 0.95), m);
          gl_FragColor = vec4(col, 1.0);
        }
      `),
    },
    {
      name: '次表面近似',
      sub: 'SSS Wrap',
      geo: 'sphere',
      mat: () => shaderMat(`
        ${VARYINGS}
        void main() {
          vec3 n = normalize(vNormal);
          vec3 l = normalize(vec3(0.3, 1.0, 0.5));
          float wrap = max(0.0, (dot(n, l) + 0.45) / 1.45);
          vec3 skin = vec3(0.95, 0.55, 0.45);
          vec3 col = skin * wrap + vec3(0.15, 0.05, 0.03) * (1.0 - wrap);
          gl_FragColor = vec4(col, 1.0);
        }
      `),
    },
    {
      name: '熔岩',
      sub: 'Lava Flow',
      geo: 'knot',
      mat: () => shaderMat(`
        uniform float uTime;
        ${NOISE_GLSL}
        ${VARYINGS}
        void main() {
          float n = fbm(vWorld * 1.8 + vec3(0.0, uTime * 0.3, 0.0));
          vec3 cold = vec3(0.15, 0.02, 0.01);
          vec3 hot = vec3(1.0, 0.35, 0.05);
          vec3 core = vec3(1.0, 0.9, 0.4);
          vec3 col = mix(cold, hot, smoothstep(0.35, 0.65, n));
          col = mix(col, core, smoothstep(0.75, 0.95, n));
          gl_FragColor = vec4(col, 1.0);
        }
      `),
    },
    {
      name: '描边',
      sub: 'Outline',
      geo: 'icosa',
      outline: true,
      mat: () => new THREE.MeshStandardMaterial({
        color: 0x3388cc,
        roughness: 0.55,
        metalness: 0.2,
      }),
    },
    {
      name: '大理石',
      sub: 'Procedural',
      geo: 'sphere',
      mat: () => shaderMat(`
        ${NOISE_GLSL}
        ${VARYINGS}
        void main() {
          float n = fbm(vWorld * 3.0);
          float vein = fbm(vWorld * 8.0 + vec3(n * 2.0));
          vec3 dark = vec3(0.12, 0.14, 0.18);
          vec3 light = vec3(0.82, 0.84, 0.88);
          vec3 col = mix(dark, light, smoothstep(0.35, 0.7, vein));
          gl_FragColor = vec4(col, 1.0);
        }
      `),
    },
    {
      name: '金属/chrome',
      sub: 'PBR Metal',
      geo: 'torusKnot',
      mat: () => new THREE.MeshStandardMaterial({
        color: 0xffffff,
        metalness: 1,
        roughness: 0.08,
        envMapIntensity: 1.5,
      }),
    },
    {
      name: '珍珠',
      sub: 'Pearl / Nacre',
      geo: 'sphere',
      mat: () => shaderMat(`
        ${VARYINGS}
        void main() {
          vec3 n = normalize(vNormal);
          vec3 v = normalize(vView);
          vec3 l = normalize(vec3(0.5, 1.0, 0.3));
          float spec = pow(max(dot(reflect(-l, n), v), 0.0), 48.0);
          float fres = pow(1.0 - max(dot(n, v), 0.0), 3.0);
          float hue = fres + n.y * 0.3;
          vec3 irid = 0.5 + 0.5 * cos(6.283 * (hue + vec3(0.0, 0.2, 0.4)));
          vec3 col = vec3(0.9) * 0.35 + irid * fres * 0.6 + spec * vec3(1.0);
          gl_FragColor = vec4(col, 1.0);
        }
      `),
    },
    {
      name: 'X光',
      sub: 'X-Ray',
      geo: 'torus',
      mat: () => shaderMat(`
        ${VARYINGS}
        void main() {
          vec3 n = normalize(vNormal);
          vec3 v = normalize(vView);
          float rim = pow(1.0 - max(dot(n, v), 0.0), 1.2);
          float core = 0.15 + 0.1 * sin(vWorld.y * 12.0);
          float a = rim * 0.85 + core;
          gl_FragColor = vec4(vec3(0.2, 1.0, 0.55), a * 0.75);
        }
      `, { transparent: true, depthWrite: false, side: THREE.DoubleSide }),
    },
    {
      name: '电路板',
      sub: 'Circuit',
      geo: 'box',
      mat: () => shaderMat(`
        uniform float uTime;
        ${VARYINGS}
        void main() {
          vec2 uv = vUv * 12.0;
          vec2 grid = abs(fract(uv - 0.5) - 0.5);
          float line = 1.0 - smoothstep(0.0, 0.04, min(grid.x, grid.y));
          float pulse = 0.5 + 0.5 * sin(uTime * 3.0 + uv.x * 4.0 + uv.y * 3.0);
          vec3 base = vec3(0.02, 0.12, 0.06);
          vec3 glow = vec3(0.1, 1.0, 0.45) * line * pulse;
          gl_FragColor = vec4(base + glow, 1.0);
        }
      `),
    },
    {
      name: '力场护盾',
      sub: 'Force Shield',
      geo: 'icosa',
      mat: () => shaderMat(`
        uniform float uTime;
        ${VARYINGS}
        void main() {
          vec3 n = normalize(vNormal);
          vec3 v = normalize(vView);
          float fres = pow(1.0 - max(dot(n, v), 0.0), 2.5);
          float hex = sin(vWorld.x * 12.0 + uTime) * sin(vWorld.y * 12.0 - uTime * 0.8) * sin(vWorld.z * 12.0);
          hex = smoothstep(0.2, 0.85, hex * 0.5 + 0.5);
          vec3 col = vec3(0.15, 0.7, 1.0) * (fres * 1.5 + hex * 0.4);
          gl_FragColor = vec4(col, fres * 0.7 + hex * 0.2);
        }
      `, { transparent: true, depthWrite: false, side: THREE.DoubleSide, blending: THREE.AdditiveBlending }),
    },
    {
      name: '故障风',
      sub: 'Glitch',
      geo: 'box',
      mat: () => shaderMat(`
        uniform float uTime;
        ${VARYINGS}
        void main() {
          float slice = step(0.92, fract(sin(floor(vUv.y * 30.0) * 12.9898) * 43758.5453));
          float shift = slice * sin(uTime * 30.0) * 0.03;
          vec2 uv = vUv + vec2(shift, 0.0);
          float r = step(0.5, fract(uv.x * 8.0 + uTime * 2.0));
          float g = step(0.5, fract(uv.y * 8.0 - uTime * 1.5));
          float b = step(0.5, fract((uv.x + uv.y) * 6.0));
          vec3 col = vec3(r, g, b) * vec3(1.0, 0.2, 0.6);
          col += vec3(0.0, 1.0, 0.9) * slice * 0.6;
          gl_FragColor = vec4(col, 1.0);
        }
      `),
    },
    {
      name: '水面涟漪',
      sub: 'Water Ripple',
      geo: 'sphere',
      mat: () => shaderMat(`
        uniform float uTime;
        ${VARYINGS}
        void main() {
          vec3 n = normalize(vNormal);
          vec3 v = normalize(vView);
          float ripple = sin(length(vWorld.xz) * 6.0 - uTime * 3.0) * 0.5 + 0.5;
          float fres = pow(1.0 - max(dot(n, v), 0.0), 3.0);
          vec3 deep = vec3(0.02, 0.12, 0.28);
          vec3 shallow = vec3(0.1, 0.55, 0.85);
          vec3 col = mix(deep, shallow, ripple * 0.6 + fres * 0.4);
          col += vec3(0.6, 0.9, 1.0) * fres * 0.5;
          gl_FragColor = vec4(col, 0.92);
        }
      `, { transparent: true }),
    },
    {
      name: '水晶折射',
      sub: 'Crystal',
      geo: 'icosa',
      mat: () => shaderMat(`
        uniform float uTime;
        ${NOISE_GLSL}
        ${VARYINGS}
        void main() {
          vec3 n = normalize(vNormal);
          vec3 v = normalize(vView);
          float n2 = fbm(vWorld * 4.0 + uTime * 0.2);
          vec3 nn = normalize(n + vec3(n2 * 0.35));
          float fres = pow(1.0 - max(dot(nn, v), 0.0), 2.0);
          float hue = fres + nn.y * 0.5 + n2;
          vec3 col = 0.5 + 0.5 * cos(6.283 * (hue * 1.2 + vec3(0.0, 0.25, 0.5)));
          col *= 0.5 + fres * 0.8;
          gl_FragColor = vec4(col, 0.88);
        }
      `, { transparent: true, side: THREE.DoubleSide }),
    },
    {
      name: '霜冻冰晶',
      sub: 'Frost / Ice',
      geo: 'sphere',
      mat: () => shaderMat(`
        uniform float uTime;
        ${NOISE_GLSL}
        ${VARYINGS}
        void main() {
          vec3 n = normalize(vNormal);
          vec3 v = normalize(vView);
          float ice = fbm(vWorld * 5.0);
          float sparkle = pow(max(dot(reflect(-normalize(vec3(0.4, 1.0, 0.3)), n), v), 0.0), 32.0);
          sparkle *= step(0.7, ice) * (0.7 + 0.3 * sin(uTime * 8.0 + ice * 20.0));
          vec3 col = mix(vec3(0.55, 0.75, 0.95), vec3(0.9, 0.96, 1.0), ice);
          col += vec3(0.8, 0.95, 1.0) * sparkle;
          float fres = pow(1.0 - max(dot(n, v), 0.0), 4.0);
          col += vec3(0.6, 0.85, 1.0) * fres * 0.35;
          gl_FragColor = vec4(col, 1.0);
        }
      `),
    },
    {
      name: '火焰',
      sub: 'Fire',
      geo: 'icosa',
      mat: () => shaderMat(`
        uniform float uTime;

      if (prev) total += prev.distanceTo(p);
      positions.push(p.x, p.y, p.z);
      dists.push(total);
      prev = p;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.setAttribute('lineDistance', new THREE.Float32BufferAttribute(dists, 1));
    return geo;
  }

  function addBaseTube(group, curve, radius = 0.28) {
    const geo = new THREE.TubeGeometry(curve, 80, radius, 10, false);
    const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
      color: 0x2a5070,
      transparent: true,
      opacity: 0.28,
      roughness: 0.35,
      metalness: 0.55,
      depthWrite: false,
      side: THREE.DoubleSide,
    }));
    group.add(mesh);
    return geo;
  }

  function addFlowTube(group, curve, type, color, hi, opts = {}) {
    const r = opts.radius ?? 0.28;
    addBaseTube(group, curve, r);
    const flowGeo = new THREE.TubeGeometry(curve, 80, r * 0.95, 12, false);
    const flow = new THREE.Mesh(flowGeo, makeEnergyTubeMat(type, color, hi, opts.speed ?? 1.2));
    flow.renderOrder = 1;
    group.add(flow);
  }

  function addFlowLine(group, points, type, color, opts = {}) {
    const geo = lineGeoFromPoints(points);
    const core = new THREE.Line(geo, new THREE.LineBasicMaterial({
      color: 0x224466, transparent: true, opacity: 0.35,
    }));
    group.add(core);
    const flow = new THREE.Line(geo, makeLineEnergyMat(type, color, opts));
    group.add(flow);
  }

  function helixCurve(turns = 1.5, height = 2.2, radius = 0.9) {
    const pts = [];
    for (let i = 0; i <= 64; i++) {
      const t = i / 64;
      const ang = t * Math.PI * 2 * turns;
      pts.push(new THREE.Vector3(Math.cos(ang) * radius, t * height - height * 0.5, Math.sin(ang) * radius));
    }
    return new THREE.CatmullRomCurve3(pts);
  }

  function sineWaveCurve(length = 3.5, amp = 0.55, waves = 2.5) {
    const pts = [];
    for (let i = 0; i <= 48; i++) {
      const t = i / 48;
      const x = (t - 0.5) * length;
      const y = Math.sin(t * Math.PI * 2 * waves) * amp;
      pts.push(new THREE.Vector3(x, y, 0));
    }
    return new THREE.CatmullRomCurve3(pts);
  }

  function lightningPoints() {
    const pts = [new THREE.Vector3(0, -1.1, 0)];
    let x = 0;
    let y = -1.1;
    for (let i = 0; i < 8; i++) {
      x += (Math.random() - 0.5) * 0.7;
      y += 0.28 + Math.random() * 0.15;
      pts.push(new THREE.Vector3(x, y, (Math.random() - 0.5) * 0.3));
    }
    return pts;
  }

    const curve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(-1.5, 0, 0), new THREE.Vector3(1.5, 0, 0),
    ]);
    addFlowTube(g, curve, type, color, hi, opts);
  }

  function addOutline(parent, geo) {
    const outline = new THREE.Mesh(
      geo,
      new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.BackSide })
    );
    outline.scale.multiplyScalar(1.08);
    parent.add(outline);
  }

  const exhibitGroup = new THREE.Group();
  exhibitGroup.position.x = MAT_ZONE_X;

    const col = i % ZONE_COLS;
    const row = Math.floor(i / ZONE_COLS);
    const x = (col - (ZONE_COLS - 1) / 2) * ZONE_SPACING;
    const z = (row - (ROWS - 1) / 2) * ZONE_SPACING;

    const geo = makeGeometry(def.geo);
    const mat = def.mat();
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, DISPLAY_Y, z);
    mesh.userData = { def, index: i };

    if (def.outline) addOutline(mesh, geo);

    addFxLabel(exhibitGroup, x, LABEL_Y, z, def.name, def.sub);
    exhibitGroup.add(mesh);
  });

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
    labelRenderer.setSize(innerWidth, innerHeight);
  });

  function animate(timestamp) {
    requestAnimationFrame(animate);
    timer.update(timestamp);
    uniforms.uTime.value = timer.getElapsed();

    controls.update();
    composer.render();
    labelRenderer.render(scene, camera);
    stats.update();
  }
  requestAnimationFrame(animate);
