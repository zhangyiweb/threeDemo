 * @Description: 风扇吹雾 — 程序化电风扇 + 锥形喷射雾气粒子，GUI 调参
 * @Date: 2022-07-19 14:44:28
-->
<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>风扇吹雾</title>
</head>
<style>
  * {
    margin: 0;
    padding: 0;
    overflow: hidden;
    box-sizing: border-box;
  }

  #hint {
    position: absolute;
    left: 16px;
    top: 16px;
    z-index: 9;
    padding: 8px 12px;
    background: rgba(0, 0, 0, 0.35);
    color: #fff;
    font: 13px/1.6 sans-serif;
    border-radius: 6px;
    pointer-events: none;
  }
</style>

<body>
  <div id="hint">鼠标拖拽观察 · 右上角面板调节风力 / 扩散 / 雾量 / 摆头</div>
  <div id="container"></div>
</body>

<script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
      }
    }
  </script>

<script type="module">
  import * as THREE from 'three';
  import Stats from 'three/addons/libs/stats.module.js';
  import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  const container = document.getElementById('container');
  const clock = new THREE.Clock();

  const scene = new THREE.Scene();
  scene.background = new THREE.Color('#1a2230');
  scene.fog = new THREE.FogExp2(0x1a2230, 0.0016);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 4000);
  camera.position.set(180, 90, 200);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  container.appendChild(renderer.domElement);

  const stats = new Stats();
  container.appendChild(stats.dom);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.maxPolarAngle = Math.PI / 2 - 0.02;
  controls.target.set(40, 50, 0);

  // ─── 灯光 ─────────────────────────────────────────────────
  scene.add(new THREE.HemisphereLight(0x9fb6d8, 0x2a2f38, 0.8));
  const key = new THREE.DirectionalLight(0xffffff, 1.6);
  key.position.set(120, 200, 160);
  key.castShadow = true;
  key.shadow.mapSize.set(2048, 2048);
  key.shadow.camera.near = 1;
  key.shadow.camera.far = 800;
  key.shadow.camera.left = -250;
  key.shadow.camera.right = 250;
  key.shadow.camera.top = 250;
  key.shadow.camera.bottom = -250;
  scene.add(key);

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(2000, 2000),
    new THREE.MeshStandardMaterial({ color: 0x39414e, roughness: 0.95 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // ─── 程序化电风扇 ─────────────────────────────────────────
  // 结构：底座 → 立柱 → 摆头组(yawGroup) → 扇头(俯仰)；扇头默认朝 +Z
  const FAN_HEIGHT = 70;
  const FAN_RADIUS = 22;

  const metalMat = new THREE.MeshStandardMaterial({ color: 0xb9c2cc, roughness: 0.35, metalness: 0.85 });

  const base = new THREE.Mesh(new THREE.CylinderGeometry(26, 32, 8, 32), metalMat);
  base.position.y = 4;
  base.castShadow = base.receiveShadow = true;
  scene.add(base);

  const pole = new THREE.Mesh(new THREE.CylinderGeometry(3, 3.5, FAN_HEIGHT, 16), metalMat);
  pole.position.y = FAN_HEIGHT / 2;
  pole.castShadow = true;
  scene.add(pole);

  // 摆头组：绕 Y 轴左右摆动
  const yawGroup = new THREE.Group();
  yawGroup.position.set(0, FAN_HEIGHT, 0);
  scene.add(yawGroup);

  // 扇头组（朝 +Z）
  const head = new THREE.Group();
  yawGroup.add(head);

  // 后壳
  const housing = new THREE.Mesh(new THREE.CylinderGeometry(FAN_RADIUS, FAN_RADIUS, 8, 32), metalMat);
  housing.rotation.x = Math.PI / 2;
  housing.position.z = -6;
  housing.castShadow = true;
  head.add(housing);

  // 防护圈
  const ring = new THREE.Mesh(new THREE.TorusGeometry(FAN_RADIUS, 1.2, 12, 48), metalMat);
  ring.position.z = 4;
  head.add(ring);

  // 扇叶组（绕 Z 轴旋转）
  const blades = new THREE.Group();
  blades.position.z = 0;
  head.add(blades);
  const bladeMat = new THREE.MeshStandardMaterial({
    color: 0x6fa8dc, roughness: 0.4, metalness: 0.3, side: THREE.DoubleSide,
    transparent: true, opacity: 0.92,
  });
  for (let i = 0; i < 4; i++) {
    const blade = new THREE.Mesh(new THREE.CircleGeometry(FAN_RADIUS * 0.85, 24, 0, Math.PI / 3), bladeMat);
    blade.rotation.z = (i / 4) * Math.PI * 2;
    blade.position.z = 1;
    blades.add(blade);
  }
  const hub = new THREE.Mesh(new THREE.SphereGeometry(4, 16, 16), metalMat);
  hub.position.z = 1.5;
  head.add(hub);

  // ─── 雾气贴图 ─────────────────────────────────────────────
  function makeSoftTexture() {
    const size = 128;
    const cv = document.createElement('canvas');
    cv.width = cv.height = size;
    const ctx = cv.getContext('2d');
    const g = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
    g.addColorStop(0, 'rgba(255,255,255,0.85)');
    g.addColorStop(0.5, 'rgba(255,255,255,0.28)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, size, size);
    const tex = new THREE.CanvasTexture(cv);
    tex.colorSpace = THREE.SRGBColorSpace;
    return tex;
  }
  const mistTex = makeSoftTexture();

  // ─── 风参数 ───────────────────────────────────────────────
  const params = {
    power: 260,        // 风力（喷射初速度）
    spread: 16,        // 扩散角（度）
    mistOpacity: 0.45, // 雾量
    mistSize: 16,      // 粒子大小
    oscillate: false,  // 摆头
    oscRange: 50,      // 摆头幅度（度）
    mistColor: '#dfe9f5',
  };

  // ─── 雾气粒子池 ───────────────────────────────────────────
  const COUNT = 1800;
  const positions = new Float32Array(COUNT * 3);
  const sizes = new Float32Array(COUNT);
  const alphas = new Float32Array(COUNT);

  // 每个粒子的 CPU 状态
  const P = Array.from({ length: COUNT }, () => ({
    vel: new THREE.Vector3(),
    life: Math.random() * 3, // 初始错峰
    maxLife: 1,
    baseSize: 1,
    dead: true,
  }));

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
  geo.setAttribute('aAlpha', new THREE.BufferAttribute(alphas, 1));

  const mistMat = new THREE.ShaderMaterial({
    uniforms: {
      uTex: { value: mistTex },
      uColor: { value: new THREE.Color(params.mistColor) },
      uOpacity: { value: params.mistOpacity },
    },
    transparent: true,
    depthWrite: false,
    blending: THREE.NormalBlending,
    vertexShader: /* glsl */`
      attribute float aSize;
      attribute float aAlpha;
      varying float vAlpha;
      void main() {
        vAlpha = aAlpha;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = aSize * (300.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: /* glsl */`
      uniform sampler2D uTex;
      uniform vec3 uColor;
      uniform float uOpacity;
      varying float vAlpha;
      void main() {
        vec4 t = texture2D(uTex, gl_PointCoord);
        gl_FragColor = vec4(uColor, t.a * vAlpha * uOpacity);
      }
    `,
  });

  const mist = new THREE.Points(geo, mistMat);
  mist.frustumCulled = false;
  scene.add(mist);

  // 复用向量
  const emitterPos = new THREE.Vector3();
  const fanForward = new THREE.Vector3();
  const fanQuat = new THREE.Quaternion();
  const tmpDir = new THREE.Vector3();
  const right = new THREE.Vector3();
  const up = new THREE.Vector3();
  const worldUp = new THREE.Vector3(0, 1, 0);

  // 在扇头朝向的圆锥内生成一个发射方向
  function spawnParticle(i) {
    const p = P[i];
    // 发射点：扇面上的小圆盘
    const r = Math.random() * FAN_RADIUS * 0.7;
    const a = Math.random() * Math.PI * 2;
    tmpDir.set(Math.cos(a) * r, Math.sin(a) * r, 4).applyQuaternion(fanQuat);
    const px = emitterPos.x + tmpDir.x;
    const py = emitterPos.y + tmpDir.y;
    const pz = emitterPos.z + tmpDir.z;
    positions[i * 3] = px;
    positions[i * 3 + 1] = py;
    positions[i * 3 + 2] = pz;

    // 圆锥扩散方向
    const spreadRad = THREE.MathUtils.degToRad(params.spread);
    const polar = Math.random() * spreadRad;
    const azim = Math.random() * Math.PI * 2;
    // 以 fanForward 为轴构造正交基
    right.crossVectors(fanForward, worldUp).normalize();
    up.crossVectors(right, fanForward).normalize();
    tmpDir.copy(fanForward).multiplyScalar(Math.cos(polar));
    tmpDir.addScaledVector(right, Math.sin(polar) * Math.cos(azim));
    tmpDir.addScaledVector(up, Math.sin(polar) * Math.sin(azim));

    const speed = params.power * (0.7 + Math.random() * 0.4);
    p.vel.copy(tmpDir).multiplyScalar(speed);
    p.life = 0;
    p.maxLife = 4.0 + Math.random() * 3.0; // 寿命更长，吹得更远
    p.baseSize = params.mistSize * (0.6 + Math.random() * 0.9);
    p.dead = false;
  }

  function updateMist(delta) {
    // 扇头世界朝向与发射点
    head.getWorldQuaternion(fanQuat);
    fanForward.set(0, 0, 1).applyQuaternion(fanQuat).normalize();
    head.getWorldPosition(emitterPos);
    emitterPos.addScaledVector(fanForward, FAN_RADIUS * 0.3);

    for (let i = 0; i < COUNT; i++) {
      const p = P[i];

      // 空闲粒子立即重新发射 → 持续不断的雾流
      if (p.dead) spawnParticle(i);

      p.life += delta;
      if (p.life >= p.maxLife) { p.dead = true; alphas[i] = 0; continue; }

      const ix = i * 3;
      // 匀速直线向外飞行（不减速、不上浮），始终在移动，不会停在远处
      positions[ix] += p.vel.x * delta;
      positions[ix + 1] += p.vel.y * delta;
      positions[ix + 2] += p.vel.z * delta;

      const lr = p.life / p.maxLife;
      // 体积随寿命缓慢增大
      sizes[i] = p.baseSize * (1 + lr * 0.8);
      // 快速淡入，越飘远越淡，最终在移动中消失
      alphas[i] = Math.min(1, lr * 5) * (1 - lr) * 0.9;
    }

    geo.attributes.position.needsUpdate = true;
    geo.attributes.aSize.needsUpdate = true;
    geo.attributes.aAlpha.needsUpdate = true;
  }

  // ─── GUI ─────────────────────────────────────────────────
  const gui = new GUI();
  gui.add(params, 'power', 50, 500, 1).name('风力');
  gui.add(params, 'spread', 2, 45, 1).name('扩散角');
  gui.add(params, 'mistOpacity', 0, 1, 0.01).name('雾量').onChange((v) => (mistMat.uniforms.uOpacity.value = v));
  gui.add(params, 'mistSize', 4, 40, 1).name('粒子大小');
  gui.addColor(params, 'mistColor').name('雾气颜色').onChange((v) => mistMat.uniforms.uColor.value.set(v));
  const fOsc = gui.addFolder('摆头');
  fOsc.add(params, 'oscillate').name('启用');
  fOsc.add(params, 'oscRange', 0, 80, 1).name('幅度(度)');
  fOsc.open();

  // ─── 主循环 ───────────────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    const delta = Math.min(clock.getDelta(), 0.05);
    const t = clock.elapsedTime;

    // 扇叶旋转（风力越大转越快）
    blades.rotation.z -= delta * (4 + params.power * 0.05);

    // 摆头
    yawGroup.rotation.y = params.oscillate
      ? Math.sin(t * 0.6) * THREE.MathUtils.degToRad(params.oscRange)
      : 0;

    updateMist(delta);

    controls.update();
    renderer.render(scene, camera);
    stats.update();
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

</html>
