<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time of Day · 真实光照</title>
</head>
<style>
  * {
    margin: 0;
    padding: 0;
    overflow: hidden;
    box-sizing: border-box;
  }

  #hud {
    position: absolute;
    left: 24px;
    top: 24px;
    z-index: 9;
    color: #fff;
    font-family: "Segoe UI", Arial, sans-serif;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.6);
    pointer-events: none;
    user-select: none;
  }

  #hud .label {
    font-size: 13px;
    letter-spacing: 3px;
    opacity: 0.7;
  }

  #hud .time {
    font-size: 46px;
    font-weight: 600;
    line-height: 1.1;
  }

  #hud .phase {
    font-size: 15px;
    opacity: 0.85;
    letter-spacing: 1px;
  }
</style>

<body>
  <div id="hud">
    <div class="label">TIME OF DAY</div>
    <div class="time" id="hud-time">12:00</div>
    <div class="phase" id="hud-phase">正午</div>
  </div>
  <div id="container"></div>
</body>
<script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
        "postprocessing": "https://unpkg.com/postprocessing@6.38.2/build/index.js"
      }
    }
  </script>
<script type="module">
  import * as THREE from 'three';
  import Stats from 'three/addons/libs/stats.module.js';
  import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { Sky } from 'three/addons/objects/Sky.js';

  const container = document.getElementById("container");
  const hudTime = document.getElementById("hud-time");
  const hudPhase = document.getElementById("hud-phase");
  const clock = new THREE.Clock();

  /* ---------- 场景 / 相机 ---------- */
  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.5, 8000);
  camera.position.set(60, 55, 130);

  /* ---------- 渲染器：真实感的关键配置 ---------- */
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;   // 电影级色调映射，高光不过曝
  renderer.toneMappingExposure = 0.65;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);

  const stats = new Stats();
  container.appendChild(stats.dom);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.maxPolarAngle = Math.PI / 2 - 0.02;          // 不让镜头钻到地面下
  controls.target.set(0, 18, 0);

  /* ---------- 物理天空 (大气散射) ---------- */
  const sky = new Sky();
  sky.scale.setScalar(10000);
  scene.add(sky);
  const skyU = sky.material.uniforms;
  skyU['turbidity'].value = 6;
  skyU['rayleigh'].value = 2;
  skyU['mieCoefficient'].value = 0.0025;   // 调小：收敛太阳附近的强散射白斑
  skyU['mieDirectionalG'].value = 0.7;

  /* ---------- 会飘动的云层 (FBM 噪声穹顶，叠在物理天空之上) ---------- */
  const cloudU = {
    uTime: { value: 0 },
    uSpeed: { value: 1.0 },
    uCoverage: { value: 0.42 },
    uOpacity: { value: 0.9 },
    uBrightness: { value: 6.0 },   // 云亮度(HDR)，与高亮度天空同量级，避免被曝光压黑
    uSunDir: { value: new THREE.Vector3(0, 1, 0) },
    uCloudColor: { value: new THREE.Color('#ffffff') },
    uSunTint: { value: new THREE.Color('#ffd9a8') },
  };
  const cloudMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    transparent: true,
    depthWrite: false,
    uniforms: cloudU,
    vertexShader: `
      varying vec3 vDir;
      void main() {
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vDir = normalize(wp.xyz - cameraPosition);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec3 vDir;
      uniform float uTime, uSpeed, uCoverage, uOpacity, uBrightness;
      uniform vec3 uSunDir, uCloudColor, uSunTint;

      float hash(vec3 p){ p = fract(p*0.3183099+0.1); p*=17.0; return fract(p.x*p.y*p.z*(p.x+p.y+p.z)); }
      float noise(vec3 x){
        vec3 i=floor(x); vec3 f=fract(x); f=f*f*(3.0-2.0*f);
        return mix(mix(mix(hash(i+vec3(0,0,0)),hash(i+vec3(1,0,0)),f.x),
                       mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
                   mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),
                       mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);
      }
      float fbm(vec3 p){ float v=0.0,a=0.5; for(int i=0;i<6;i++){ v+=a*noise(p); p*=2.02; a*=0.5; } return v; }

      void main(){
        vec3 dir = normalize(vDir);
        if (dir.y < 0.02) discard;                 // 地平线以下不画云
        float t = uTime * uSpeed;
        float y = max(dir.y, 0.06);
        vec2 uv = dir.xz / y;                       // 把视线投影到头顶水平面
        uv *= 0.35;
        uv += vec2(t * 0.02, t * 0.013);            // 水平风：云只横向飘
        float base   = fbm(vec3(uv, t * 0.01));
        float detail = fbm(vec3(uv * 2.6, t * 0.02));
        float clouds = base * 0.6 + detail * 0.4;

        float lo = 1.0 - uCoverage;
        float density = smoothstep(lo, lo + 0.32, clouds);
        density *= smoothstep(0.02, 0.30, dir.y);   // 地平线宽幅淡出，隐藏拉伸

        float sun = pow(max(dot(dir, normalize(uSunDir)), 0.0), 6.0);
        float shade = mix(0.78, 1.0, smoothstep(lo, 1.0, clouds)); // 厚处略暗，有体积感
        vec3 col = (uCloudColor * shade + uSunTint * sun * 0.7) * uBrightness;

        gl_FragColor = vec4(col, density * uOpacity);
      }
    `,
  });
  const cloudDome = new THREE.Mesh(new THREE.SphereGeometry(4000, 48, 24), cloudMat);
  scene.add(cloudDome);

  /* ---------- 灯光：太阳方向光 + 半球补光 ---------- */
  const sunLight = new THREE.DirectionalLight(0xffffff, 3);
  sunLight.castShadow = true;
  sunLight.shadow.mapSize.set(2048, 2048);
  sunLight.shadow.camera.near = 1;
  sunLight.shadow.camera.far = 600;
  sunLight.shadow.camera.left = -160;
  sunLight.shadow.camera.right = 160;
  sunLight.shadow.camera.top = 160;
  sunLight.shadow.camera.bottom = -160;
  sunLight.shadow.bias = -0.0002;
  scene.add(sunLight, sunLight.target);

  const hemiLight = new THREE.HemisphereLight(0xbcd6ff, 0x5a4a36, 0.4);
  scene.add(hemiLight);

  /* ---------- 雾：颜色跟着天空地平线走 ---------- */
  scene.fog = new THREE.Fog(0xbfe6ff, 400, 3000);

  /* ---------- 地面 + 展示物体 (PBR 材质用来体现 IBL 反射) ---------- */
  const ground = new THREE.Mesh(
    new THREE.CircleGeometry(600, 64),
    new THREE.MeshStandardMaterial({ color: 0x3c4148, roughness: 0.55, metalness: 0.0 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // 中央镜面金属球：最能体现天空环境反射随时间变化
  const chromeSphere = new THREE.Mesh(
    new THREE.SphereGeometry(20, 64, 64),
    new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 1.0, roughness: 0.04 })
  );
  chromeSphere.position.set(0, 22, 0);
  chromeSphere.castShadow = true;
  scene.add(chromeSphere);

  // 一圈不同粗糙度/金属度的小球，展示 PBR 在同一光照下的差异
  const palette = [0xe07a5f, 0xf2cc8f, 0x81b29a, 0x8ecae6, 0xcdb4db, 0xff99c8];
  for (let i = 0; i < 6; i++) {
    const ang = (i / 6) * Math.PI * 2;
    const m = new THREE.Mesh(
      new THREE.SphereGeometry(10, 48, 48),
      new THREE.MeshStandardMaterial({
        color: palette[i],
        metalness: i % 2 === 0 ? 0.9 : 0.1,
        roughness: 0.1 + (i / 6) * 0.7,
      })
    );
    m.position.set(Math.cos(ang) * 60, 10, Math.sin(ang) * 60);
    m.castShadow = true;
    m.receiveShadow = true;
    scene.add(m);
  }

  // 几个方块增加阴影层次
  const boxMat = new THREE.MeshStandardMaterial({ color: 0xdfe3e8, roughness: 0.7, metalness: 0.05 });
  [[-110, 16, -40], [100, 24, 30], [-30, 12, 110]].forEach(([x, h, z]) => {
    const b = new THREE.Mesh(new THREE.BoxGeometry(h, h * 2, h), boxMat);
    b.position.set(x, h, z);
    b.castShadow = true;
    b.receiveShadow = true;
    scene.add(b);
  });

  /* ---------- 环境贴图：把天空实时烘焙成 IBL ---------- */
  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();
  const skyScene = new THREE.Scene();         // 仅含天空，用于生成干净的环境贴图
  let envRT = null;

  function updateEnvironment() {
    if (envRT) envRT.dispose();
    scene.remove(sky);
    skyScene.add(sky);
    envRT = pmrem.fromScene(skyScene);
    skyScene.remove(sky);
    scene.add(sky);
    scene.environment = envRT.texture;        // 所有 PBR 材质据此获得环境光与反射
  }

  /* ---------- 太阳位置 / 光照随时间 (0~24h) 联动 ---------- */
  const sunVec = new THREE.Vector3();
  const warmColor = new THREE.Color('#ff7b39');   // 低空暖橙
  const noonColor = new THREE.Color('#fff3df');   // 高空近白
  const nightHemi = new THREE.Color('#24344f');   // 夜晚冷蓝天光
  const dayHemi = new THREE.Color('#bcd6ff');
  const cloudDay = new THREE.Color('#eef2f8');     // 白天云色
  const cloudNight = new THREE.Color('#1c2738');   // 夜晚云色
  const cloudColor = new THREE.Color();            // 复用，避免每帧 new

  let lastEnvHour = -999;

  const tune = {
    time: 7.68,
    // 物理天空（随时间插值）
    turbidityMin: 2.5,
    turbidityRange: 7,
    rayleighMin: 0.85,
    rayleighRange: 1.0,
    mieMin: 0.003,
    mieRange: 0.004,
    mieDirectionalG: 0.7,
    lockSkyParams: false,
    skyTurbidity: 6,
    skyRayleigh: 2,
    skyMie: 0.0025,
    // 太阳光
    warmColor: '#ff7b39',
    noonColor: '#fff3df',
    sunIntensityMax: 4.5,
    lockSunLight: false,
    sunIntensity: 3,
    sunColorManual: '#fff3df',
    // 半球光
    nightHemi: '#24344f',
    dayHemi: '#bcd6ff',
    groundHemi: '#5a4a36',
    hemiIntensityNight: 0.15,
    hemiIntensityDay: 0.5,
    lockHemiLight: false,
    hemiIntensity: 0.4,
    hemiColorManual: '#bcd6ff',
    // 云
    coverage: 0.59,
    cloudSpeed: 1.0,
    cloudOpacity: 0.9,
    cloudDay: '#eef2f8',
    cloudNight: '#1c2738',
    sunTint: '#ffd9a8',
    cloudBrightnessDay: 7.0,
    cloudBrightnessNight: 0.4,
    warmCloudMix: 0.5,
    lockCloudAuto: false,
    cloudColorManual: '#ffffff',
    cloudBrightness: 6.0,
    // 雾
    fogNear: 400,
    fogFar: 3000,
    fogBrightnessMin: 0.4,
    fogBrightnessMax: 0.6,
    lockFog: false,
    fogColorManual: '#bfe6ff',
    // 渲染
    exposureMin: 0.30,
    exposureRange: 0.12,
    lockExposure: false,
    exposure: 0.42,
  };

  warmColor.set(tune.warmColor);
  noonColor.set(tune.noonColor);
  nightHemi.set(tune.nightHemi);
  dayHemi.set(tune.dayHemi);
  cloudDay.set(tune.cloudDay);
  cloudNight.set(tune.cloudNight);
  cloudU.uSunTint.value.set(tune.sunTint);
  cloudU.uCoverage.value = tune.coverage;
  cloudU.uSpeed.value = tune.cloudSpeed;
  cloudU.uOpacity.value = tune.cloudOpacity;
  hemiLight.groundColor.set(tune.groundHemi);

  function refresh(forceEnv = false) {
    updateSun(tune.time, forceEnv);
  }

  function updateSun(hour, rebuildEnv = true) {
    // 高度角：6 点日出(0°)，12 点最高(~58°)，18 点日落(0°)
    const t = (hour - 6) / 12;
    const elevation = Math.sin(t * Math.PI) * 58;
    const azimuth = 90 + (hour / 24) * 360;

    const phi = THREE.MathUtils.degToRad(90 - elevation);
    const theta = THREE.MathUtils.degToRad(azimuth);
    sunVec.setFromSphericalCoords(1, phi, theta);
    skyU['sunPosition'].value.copy(sunVec);

    const lowSun = THREE.MathUtils.clamp(1 - elevation / 18, 0, 1);
    skyU['mieDirectionalG'].value = tune.mieDirectionalG;

    if (tune.lockSkyParams) {
      skyU['turbidity'].value = tune.skyTurbidity;
      skyU['rayleigh'].value = tune.skyRayleigh;
      skyU['mieCoefficient'].value = tune.skyMie;
    } else {
      skyU['turbidity'].value = tune.turbidityMin + lowSun * tune.turbidityRange;
      skyU['rayleigh'].value = tune.rayleighMin + lowSun * tune.rayleighRange;
      skyU['mieCoefficient'].value = tune.mieMin + lowSun * tune.mieRange;
    }

    const dayFactor = THREE.MathUtils.clamp(Math.sin(THREE.MathUtils.degToRad(elevation)), 0, 1);
    const warmth = THREE.MathUtils.clamp(elevation / 25, 0, 1);

    sunLight.position.copy(sunVec).multiplyScalar(300);
    sunLight.target.position.set(0, 0, 0);

    warmColor.set(tune.warmColor);
    noonColor.set(tune.noonColor);
    if (tune.lockSunLight) {
      sunLight.color.set(tune.sunColorManual);
      sunLight.intensity = tune.sunIntensity;
    } else {
      sunLight.color.copy(warmColor).lerp(noonColor, warmth);
      sunLight.intensity = dayFactor * tune.sunIntensityMax;
    }

    hemiLight.groundColor.set(tune.groundHemi);
    nightHemi.set(tune.nightHemi);
    dayHemi.set(tune.dayHemi);
    if (tune.lockHemiLight) {
      hemiLight.color.set(tune.hemiColorManual);
      hemiLight.intensity = tune.hemiIntensity;
    } else {
      hemiLight.color.copy(nightHemi).lerp(dayHemi, dayFactor);
      hemiLight.intensity = tune.hemiIntensityNight + dayFactor * (tune.hemiIntensityDay - tune.hemiIntensityNight);
    }

    if (tune.lockExposure) {
      renderer.toneMappingExposure = tune.exposure;
    } else {
      renderer.toneMappingExposure = tune.exposureMin + dayFactor * tune.exposureRange;
    }

    cloudU.uSunDir.value.copy(sunVec);
    cloudU.uSpeed.value = tune.cloudSpeed;
    cloudU.uCoverage.value = tune.coverage;
    cloudU.uOpacity.value = tune.cloudOpacity;
    cloudU.uSunTint.value.set(tune.sunTint);

    cloudDay.set(tune.cloudDay);
    cloudNight.set(tune.cloudNight);
    if (tune.lockCloudAuto) {
      cloudU.uCloudColor.value.set(tune.cloudColorManual);
      cloudU.uBrightness.value = tune.cloudBrightness;
    } else {
      cloudColor.copy(cloudNight).lerp(cloudDay, dayFactor)
        .lerp(warmColor, lowSun * dayFactor * tune.warmCloudMix);
      cloudU.uCloudColor.value.copy(cloudColor);
      cloudU.uBrightness.value = tune.cloudBrightnessNight + dayFactor * (tune.cloudBrightnessDay - tune.cloudBrightnessNight);
    }

    scene.fog.near = tune.fogNear;
    scene.fog.far = tune.fogFar;
    if (tune.lockFog) {
      scene.fog.color.set(tune.fogColorManual);
    } else {
      scene.fog.color.copy(warmColor).lerp(dayHemi, dayFactor)
        .multiplyScalar(tune.fogBrightnessMin + dayFactor * tune.fogBrightnessMax);
    }

    if (rebuildEnv || Math.abs(hour - lastEnvHour) > 0.12) {
      updateEnvironment();
      lastEnvHour = hour;
    }
    updateHud(hour, elevation);
  }

  function updateHud(hour, elevation) {
    const h = Math.floor(hour) % 24;
    const m = Math.floor((hour - Math.floor(hour)) * 60);
    hudTime.textContent = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    let phase = '正午';
    if (elevation < 0) phase = '夜晚';
    else if (hour < 8) phase = '清晨';
    else if (hour < 11) phase = '上午';
    else if (hour < 14) phase = '正午';
    else if (hour < 17) phase = '下午';
    else phase = '黄昏';
    hudPhase.textContent = phase;
  }

  /* ---------- GUI ---------- */
  const gui = new GUI({ width: 320 });
  gui.title('真实光照 · 调参');

  const fTime = gui.addFolder('时间轴');
  fTime.add(tune, 'time', 0, 24, 0.01).name('时刻 (小时)').onChange(() => refresh(true));
  fTime.open();

  const fSky = gui.addFolder('物理天空');
  const onSkyChange = () => refresh(true);
  fSky.add(tune, 'lockSkyParams').name('锁定(手动)').onChange(onSkyChange);
  fSky.add(tune, 'turbidityMin', 0, 20, 0.1).name('浑浊度·正午').onChange(onSkyChange);
  fSky.add(tune, 'turbidityRange', 0, 20, 0.1).name('浑浊度·低空增量').onChange(onSkyChange);
  fSky.add(tune, 'rayleighMin', 0, 4, 0.05).name('瑞利·正午').onChange(onSkyChange);
  fSky.add(tune, 'rayleighRange', 0, 4, 0.05).name('瑞利·低空增量').onChange(onSkyChange);
  fSky.add(tune, 'mieMin', 0, 0.02, 0.0001).name('米氏·正午').onChange(onSkyChange);
  fSky.add(tune, 'mieRange', 0, 0.02, 0.0001).name('米氏·低空增量').onChange(onSkyChange);
  fSky.add(tune, 'mieDirectionalG', 0, 1, 0.01).name('米氏方向性 G').onChange(onSkyChange);
  fSky.add(tune, 'skyTurbidity', 0, 20, 0.1).name('手动浑浊度').onChange(onSkyChange);
  fSky.add(tune, 'skyRayleigh', 0, 4, 0.05).name('手动瑞利').onChange(onSkyChange);
  fSky.add(tune, 'skyMie', 0, 0.02, 0.0001).name('手动米氏').onChange(onSkyChange);

  const fSun = gui.addFolder('太阳光');
  fSun.add(tune, 'lockSunLight').name('锁定(手动)').onChange(refresh);
  fSun.addColor(tune, 'warmColor').name('低空暖色').onChange(refresh);
  fSun.addColor(tune, 'noonColor').name('高空色').onChange(refresh);
  fSun.add(tune, 'sunIntensityMax', 0, 10, 0.1).name('强度上限').onChange(refresh);
  fSun.addColor(tune, 'sunColorManual').name('手动颜色').onChange(refresh);
  fSun.add(tune, 'sunIntensity', 0, 10, 0.1).name('手动强度').onChange(refresh);

  const fHemi = gui.addFolder('半球光');
  fHemi.add(tune, 'lockHemiLight').name('锁定(手动)').onChange(refresh);
  fHemi.addColor(tune, 'nightHemi').name('夜晚天光').onChange(refresh);
  fHemi.addColor(tune, 'dayHemi').name('白天天光').onChange(refresh);
  fHemi.addColor(tune, 'groundHemi').name('地面反弹').onChange(refresh);
  fHemi.add(tune, 'hemiIntensityNight', 0, 2, 0.01).name('夜晚强度').onChange(refresh);
  fHemi.add(tune, 'hemiIntensityDay', 0, 2, 0.01).name('白天强度').onChange(refresh);
  fHemi.addColor(tune, 'hemiColorManual').name('手动天光色').onChange(refresh);
  fHemi.add(tune, 'hemiIntensity', 0, 2, 0.01).name('手动强度').onChange(refresh);

  const fCloud = gui.addFolder('云');
  fCloud.add(tune, 'lockCloudAuto').name('锁定(手动)').onChange(refresh);
  fCloud.add(tune, 'coverage', 0, 1, 0.01).name('云量').onChange(refresh);
  fCloud.add(tune, 'cloudSpeed', 0, 4, 0.05).name('云速').onChange(refresh);
  fCloud.add(tune, 'cloudOpacity', 0, 1, 0.01).name('不透明度').onChange(refresh);
  fCloud.addColor(tune, 'cloudDay').name('白天云色').onChange(refresh);
  fCloud.addColor(tune, 'cloudNight').name('夜晚云色').onChange(refresh);
  fCloud.addColor(tune, 'sunTint').name('朝阳染色').onChange(refresh);
  fCloud.add(tune, 'cloudBrightnessDay', 0, 15, 0.1).name('白天亮度').onChange(refresh);
  fCloud.add(tune, 'cloudBrightnessNight', 0, 5, 0.05).name('夜晚亮度').onChange(refresh);
  fCloud.add(tune, 'warmCloudMix', 0, 1, 0.01).name('暖色混合').onChange(refresh);
  fCloud.addColor(tune, 'cloudColorManual').name('手动云色').onChange(refresh);
  fCloud.add(tune, 'cloudBrightness', 0, 15, 0.1).name('手动亮度').onChange(refresh);
  fCloud.open();

  const fFog = gui.addFolder('雾');
  fFog.add(tune, 'lockFog').name('锁定(手动)').onChange(refresh);
  fFog.add(tune, 'fogNear', 50, 2000, 10).name('近距').onChange(refresh);
  fFog.add(tune, 'fogFar', 500, 8000, 50).name('远距').onChange(refresh);
  fFog.add(tune, 'fogBrightnessMin', 0, 2, 0.01).name('暗部乘数').onChange(refresh);
  fFog.add(tune, 'fogBrightnessMax', 0, 2, 0.01).name('亮部乘数').onChange(refresh);
  fFog.addColor(tune, 'fogColorManual').name('手动雾色').onChange(refresh);

  const fRender = gui.addFolder('渲染 / IBL');
  fRender.add(tune, 'lockExposure').name('锁定曝光').onChange(refresh);
  fRender.add(tune, 'exposureMin', 0, 2, 0.01).name('曝光·夜间').onChange(refresh);
  fRender.add(tune, 'exposureRange', 0, 1, 0.01).name('曝光·昼夜增量').onChange(refresh);
  fRender.add(tune, 'exposure', 0, 2, 0.01).name('手动曝光').onChange(refresh);
  fRender.add({ rebuild: () => refresh(true) }, 'rebuild').name('重建环境贴图');

  /* ---------- 主循环 ---------- */
  refresh();

  function animate() {
    requestAnimationFrame(animate);
    cloudU.uTime.value = clock.getElapsedTime();   // 驱动云持续飘动

    sky.position.copy(camera.position);            // 天空穹顶跟随相机
    cloudDome.position.copy(camera.position);
    controls.update();
    stats.update();
    renderer.render(scene, camera);
  }
  animate();

  /* ---------- 自适应 ---------- */
  addEventListener("resize", () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
</script>
